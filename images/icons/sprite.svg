<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ═══════════════════════════════════════════
       BENEFIT ICONS  24×24  stroke / currentColor
       ═══════════════════════════════════════════ -->

  <!-- ic-meditation: person in lotus pose -->
  <symbol id="ic-meditation" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="4.5" r="1.8"/>
    <!-- body torso -->
    <path d="M12 6.3 C12 8 12 9 12 10"/>
    <!-- left leg/arm spread -->
    <path d="M12 9 C10 9.5 7.5 10 6 11 C5 11.5 5.5 13 6.5 13"/>
    <!-- right leg/arm spread -->
    <path d="M12 9 C14 9.5 16.5 10 18 11 C19 11.5 18.5 13 17.5 13"/>
    <!-- lap base -->
    <path d="M6.5 13 C8 14.5 10 15 12 15 C14 15 16 14.5 17.5 13"/>
    <!-- hands joined -->
    <path d="M9.5 12.5 L11.5 13.5 L12.5 13.5 L14.5 12.5"/>
    <!-- halo -->
    <circle cx="12" cy="4.5" r="3.2" stroke-dasharray="1.2 1.4" opacity="0.45"/>
  </symbol>

  <!-- ic-wisdom: eye with rays -->
  <symbol id="ic-wisdom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- eye outline -->
    <path d="M3 12 C6 7 18 7 21 12 C18 17 6 17 3 12 Z"/>
    <!-- iris -->
    <circle cx="12" cy="12" r="3"/>
    <!-- pupil -->
    <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
    <!-- rays top -->
    <line x1="12" y1="3.5" x2="12" y2="5.5"/>
    <line x1="16.5" y1="4.8" x2="15.4" y2="6.5"/>
    <line x1="7.5" y1="4.8" x2="8.6" y2="6.5"/>
  </symbol>

  <!-- ic-sleep: crescent moon + stars -->
  <symbol id="ic-sleep" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- moon crescent via arc trick -->
    <path d="M18 12 A8 8 0 1 1 12 4 A6 6 0 0 0 18 12 Z" fill="currentColor" stroke="currentColor" stroke-width="0"/>
    <!-- stars -->
    <circle cx="19" cy="5" r="1" fill="currentColor" stroke="none"/>
    <circle cx="21" cy="10" r="0.7" fill="currentColor" stroke="none"/>
    <circle cx="20" cy="3" r="0.5" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- ic-protection: shield with center diamond -->
  <symbol id="ic-protection" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- shield -->
    <path d="M12 2 L20 5.5 L20 11 C20 15.5 16.5 19.5 12 21 C7.5 19.5 4 15.5 4 11 L4 5.5 Z"/>
    <!-- center diamond -->
    <path d="M12 8 L14.5 12 L12 16 L9.5 12 Z"/>
  </symbol>

  <!-- ic-spiritual: lotus flower 8 petals -->
  <symbol id="ic-spiritual" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- center -->
    <circle cx="12" cy="12" r="2.2"/>
    <!-- 8 petals as ellipses rotated -->
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(0 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(45 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(90 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(135 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(180 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(225 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(270 12 12)"/>
    <ellipse cx="12" cy="6.5" rx="1.5" ry="3" transform="rotate(315 12 12)"/>
  </symbol>

  <!-- ic-calm: three gentle waves -->
  <symbol id="ic-calm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
    <path d="M3 8 C5.5 5.5 8.5 5.5 12 8 C15.5 10.5 18.5 10.5 21 8"/>
    <path d="M3 12 C5.5 9.5 8.5 9.5 12 12 C15.5 14.5 18.5 14.5 21 12"/>
    <path d="M3 16 C5.5 13.5 8.5 13.5 12 16 C15.5 18.5 18.5 18.5 21 16"/>
  </symbol>

  <!-- ic-love: heart -->
  <symbol id="ic-love" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <path d="M12 21 C12 21 3 15 3 8.5 C3 5.4 5.4 3 8.5 3 C10.2 3 11.7 3.8 12 4.5 C12.3 3.8 13.8 3 15.5 3 C18.6 3 21 5.4 21 8.5 C21 15 12 21 12 21 Z"/>
  </symbol>

  <!-- ic-energy: lightning bolt -->
  <symbol id="ic-energy" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <path d="M13 2 L5 13 L11 13 L11 22 L19 11 L13 11 Z"/>
  </symbol>

  <!-- ic-prosperity: star in circle -->
  <symbol id="ic-prosperity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9.5"/>
    <!-- 6-pointed star -->
    <path d="M12 5 L13.8 9.5 L18.5 9.5 L14.8 12.5 L16.2 17 L12 14.5 L7.8 17 L9.2 12.5 L5.5 9.5 L10.2 9.5 Z"/>
  </symbol>

  <!-- ═══════════════════════════════════════════
       CHAKRA SYMBOLS  48×48  traditional geometry
       ═══════════════════════════════════════════ -->

  <!-- ic-crown: Sahasrara — 12 petals + center dot | violet #7c3aed -->
  <symbol id="ic-crown" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- 12 petal dots r=20 from center -->
    <g fill="#7c3aed">
      <circle cx="24" cy="4"   r="2.2" transform="rotate(0   24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(30  24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(60  24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(90  24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(120 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(150 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(180 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(210 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(240 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(270 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(300 24 24)"/>
      <circle cx="24" cy="4"   r="2.2" transform="rotate(330 24 24)"/>
    </g>
    <!-- inner circle + center dot -->
    <circle cx="24" cy="24" r="9" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="3" fill="#7c3aed"/>
  </symbol>

  <!-- ic-thirdeye: Ajna — 2 petals + triangle + eye | indigo #4338ca -->
  <symbol id="ic-thirdeye" viewBox="0 0 48 48">
    <!-- outer circle -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="#4338ca" stroke-width="1.5"/>
    <!-- 2 oval petals left + right -->
    <ellipse cx="24" cy="24" rx="16" ry="8" fill="none" stroke="#4338ca" stroke-width="1.5"/>
    <!-- downward triangle -->
    <path d="M15 18 L33 18 L24 32 Z" fill="none" stroke="#4338ca" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- eye in center -->
    <ellipse cx="24" cy="24" rx="5" ry="3" fill="none" stroke="#4338ca" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="1.8" fill="#4338ca"/>
  </symbol>

  <!-- ic-throat: Vishuddha — 16 petals + inner circle + inverted triangle | blue #0891b2 -->
  <symbol id="ic-throat" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#0891b2" stroke-width="1.5"/>
    <!-- 16 petal lines radiating r14→r20 -->
    <g stroke="#0891b2" stroke-width="1.4">
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(0   24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(22.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(45  24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(67.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(90  24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(112.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(135 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(157.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(180 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(202.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(225 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(247.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(270 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(292.5 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(315 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="10" transform="rotate(337.5 24 24)"/>
    </g>
    <!-- inner circle -->
    <circle cx="24" cy="24" r="10" fill="none" stroke="#0891b2" stroke-width="1.5"/>
    <!-- downward triangle inside -->
    <path d="M18 20 L30 20 L24 30 Z" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-heart: Anahata — hexagram (star of david) | green #059669 -->
  <symbol id="ic-heart" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#059669" stroke-width="1.5"/>
    <!-- 12 petals -->
    <g fill="none" stroke="#059669" stroke-width="1.2">
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(0   24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(30  24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(60  24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(90  24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(120 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(150 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(180 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(210 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(240 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(270 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(300 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.5" ry="5" transform="rotate(330 24 24)"/>
    </g>
    <!-- hexagram: upward triangle -->
    <path d="M24 13 L32 27 L16 27 Z" fill="none" stroke="#059669" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- hexagram: downward triangle -->
    <path d="M24 35 L16 21 L32 21 Z" fill="none" stroke="#059669" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- center dot -->
    <circle cx="24" cy="24" r="2.5" fill="#059669"/>
  </symbol>

  <!-- ic-solar: Manipura — 10 petals + downward triangle | amber #d97706 -->
  <symbol id="ic-solar" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <!-- 10 petal ellipses -->
    <g fill="none" stroke="#d97706" stroke-width="1.2">
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(0   24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(36  24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(72  24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(108 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(144 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(180 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(216 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(252 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(288 24 24)"/>
      <ellipse cx="24" cy="13" rx="2.2" ry="5" transform="rotate(324 24 24)"/>
    </g>
    <!-- inner circle -->
    <circle cx="24" cy="24" r="9" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <!-- downward triangle -->
    <path d="M18 20 L30 20 L24 30 Z" fill="none" stroke="#d97706" stroke-width="1.8" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-sacral: Svadhisthana — 6 circle petals + crescent | orange #ea580c -->
  <symbol id="ic-sacral" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#ea580c" stroke-width="1.5"/>
    <!-- 6 petal circles at r=11 -->
    <g fill="none" stroke="#ea580c" stroke-width="1.4">
      <circle cx="24" cy="13" r="5" transform="rotate(0   24 24)"/>
      <circle cx="24" cy="13" r="5" transform="rotate(60  24 24)"/>
      <circle cx="24" cy="13" r="5" transform="rotate(120 24 24)"/>
      <circle cx="24" cy="13" r="5" transform="rotate(180 24 24)"/>
      <circle cx="24" cy="13" r="5" transform="rotate(240 24 24)"/>
      <circle cx="24" cy="13" r="5" transform="rotate(300 24 24)"/>
    </g>
    <!-- inner circle -->
    <circle cx="24" cy="24" r="8" fill="none" stroke="#ea580c" stroke-width="1.5"/>
    <!-- crescent inside -->
    <path d="M20 21 A5 5 0 0 1 28 21 A3.5 3.5 0 0 0 20 21 Z" fill="#ea580c"/>
  </symbol>

  <!-- ic-root: Muladhara — 4 petals + rotated square + downward triangle | red #dc2626 -->
  <symbol id="ic-root" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#dc2626" stroke-width="1.5"/>
    <!-- 4 petal ellipses -->
    <g fill="none" stroke="#dc2626" stroke-width="1.4">
      <ellipse cx="24" cy="12" rx="3" ry="6" transform="rotate(0   24 24)"/>
      <ellipse cx="24" cy="12" rx="3" ry="6" transform="rotate(90  24 24)"/>
      <ellipse cx="24" cy="12" rx="3" ry="6" transform="rotate(180 24 24)"/>
      <ellipse cx="24" cy="12" rx="3" ry="6" transform="rotate(270 24 24)"/>
    </g>
    <!-- rotated square (diamond) -->
    <path d="M24 14 L34 24 L24 34 L14 24 Z" fill="none" stroke="#dc2626" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- downward triangle inside -->
    <path d="M19 21 L29 21 L24 31 Z" fill="none" stroke="#dc2626" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- center dot -->
    <circle cx="24" cy="24" r="2.5" fill="#dc2626"/>
  </symbol>

</svg>
