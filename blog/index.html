   title:'เพลงและเสียงธรรมชาติที่ใช้คู่กับหินได้ดีที่สุด',

const TAGS = [
  {t:'มือใหม่',s:'lg'},{t:'คริสตัล',s:'lg'},{t:'ฮวงจุ้ย',s:'lg'},{t:'ล้างหิน',s:'lg'},
  {t:'ชาร์จหิน',s:'lg'},{t:'สมาธิ',s:'lg'},{t:'ของแท้',s:'lg'},{t:'Crystal Grid',s:'lg'},
  {t:'เลือกหิน',s:'md'},{t:'DIY',s:'md'},{t:'Sound Healing',s:'md'},{t:'พลังงาน',s:'md'},
  {t:'สะสม',s:'md'},{t:'บ้าน',s:'md'},{t:'Bagua',s:'md'},{t:'อเมทิสต์',s:'md'},
  {t:'ซิทริน',s:'md'},{t:'โรสควอตซ์',s:'md'},{t:'ทัวร์มาลีนดำ',s:'md'},{t:'ไพไรต์',s:'md'},
  {t:'เสจ',s:'sm'},{t:'Singing Bowl',s:'sm'},{t:'432Hz',s:'sm'},{t:'ผลึก',s:'sm'},
  {t:'Mohs',s:'sm'},{t:'Intention',s:'sm'},{t:'แหล่งหิน',s:'sm'},{t:'ของปลอม',s:'sm'},
  {t:'เครื่องประดับ',s:'sm'},{t:'ธรณีวิทยา',s:'sm'},{t:'Sacred Geometry',s:'sm'},
  {t:'นอนหลับ',s:'sm'},{t:'ราคาหิน',s:'sm'},{t:'Meditation',s:'sm'},
];

let curCat = 'all', curTag = '';

function counts() {
  const c = {};
  CATS.forEach(cat => c[cat.id] = ARTICLES.filter(a => a.cat === cat.id).length);
  return c;
}

function buildCatNav() {
  const c = counts();
  const total = ARTICLES.length;
  document.getElementById('catNav').innerHTML =
    `<button class="cnav on" onclick="setCat('all',this)">ทั้งหมด <span class="cnav-count">${total}</span></button>` +
    CATS.map(cat =>
      `<button class="cnav" onclick="setCat('${cat.id}',this)">${cat.icon} ${cat.th} <span class="cnav-count">${c[cat.id]}</span></button>`
    ).join('');
}

function setCat(id, btn) {
  curCat = id; curTag = '';
  document.querySelectorAll('.cnav').forEach(b => b.classList.remove('on'));
  btn?.classList.add('on');
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('on'));
  renderAll();
}

function setTag(t, el) {
  curTag = curTag === t ? '' : t;
  curCat = 'all';
  document.querySelectorAll('.cnav').forEach(b => b.classList.remove('on'));
  document.querySelector('.cnav')?.classList.add('on');
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('on'));
  if (curTag) el.classList.add('on');
  renderAll();
}

function filtered() {
  const q = document.getElementById('blogSearch').value.toLowerCase();
  return ARTICLES.filter(a => {
    const matchCat = curCat === 'all' || a.cat === curCat;
    const matchTag = !curTag || a.tags.includes(curTag);
    const matchQ   = !q || a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q) || a.tags.some(t => t.toLowerCase().includes(q));
    return matchCat && matchTag && matchQ;
  });
}

function renderAll() {
  const list = filtered();
  if (!list.length) {
    document.getElementById('blogFeatured').innerHTML = '';
    document.getElementById('blogSections').innerHTML =
      '<div class="empty"><div class="empty-icon">🔍</div><div>ไม่พบบทความที่ตรงกับการค้นหา</div></div>';
    return;
  }

  // Featured (first article with featured:true, or just first)
  const feat = list.find(a => a.featured) || list[0];
  const catInfo = CATS.find(c => c.id === feat.cat);
  document.getElementById('blogFeatured').innerHTML = `
    <a href="${feat.url || '#'}" class="feat-card" ${!feat.url ? 'onclick="return false"' : ''}>
      <div class="feat-img">${feat.emoji}</div>
      <div class="feat-body">
        <div class="feat-label"><span class="feat-label-dot"></span>${catInfo?.icon} ${catInfo?.th}</div>
        <div class="feat-title">${feat.title}</div>
        <div class="feat-desc">${feat.desc}</div>
        <div class="feat-tags">${feat.tags.map(t=>`<span class="feat-tag">#${t}</span>`).join('')}</div>
        ${feat.url ? '<div class="feat-cta">อ่านบทความ →</div>' : '<span class="feat-soon">🔜 เร็วๆ นี้</span>'}
      </div>
    </a>`;

  // If showing all cats, group by category; else flat grid
  const rest = list.filter(a => a !== feat);
  let html = '';
  if (curCat === 'all' && !curTag) {
    const groups = {};
    rest.forEach(a => { if (!groups[a.cat]) groups[a.cat] = []; groups[a.cat].push(a); });
    CATS.forEach(cat => {
      if (!groups[cat.id]?.length) return;
      html += `<div class="blog-section-title">${cat.icon} ${cat.th}</div>
               <div class="grid">${groups[cat.id].map(cardHTML).join('')}</div>`;
    });
  } else {
    html = `<div class="grid">${rest.map(cardHTML).join('')}</div>`;
  }
  document.getElementById('blogSections').innerHTML = html;
}

function cardHTML(a) {
  const cat = CATS.find(c => c.id === a.cat);
  return `<a href="${a.url || '#'}" class="card${a.url ? '' : ' soon'}" ${!a.url ? 'onclick="return false"' : ''}>
    <div class="card-img">${a.emoji}</div>
    <div class="card-body">
      <div class="card-cat">${cat?.icon} ${cat?.th}</div>
      <div class="card-title">${a.title}</div>
      <div class="card-desc">${a.desc}</div>
    </div>
    <div class="card-foot">
      <span>${a.tags.slice(0,2).map(t=>'#'+t).join(' ')}</span>
      ${a.url ? '<span class="read">อ่าน →</span>' : '<span class="soon-badge">เร็วๆ นี้</span>'}
    </div>
  </a>`;
}

function renderTags() {
  document.getElementById('tagCloud').innerHTML = TAGS.map(t =>
    `<button class="tag-pill ${t.s}" onclick="setTag('${t.t}',this)">#${t.t}</button>`
  ).join('');
}

buildCatNav();
renderAll();
renderTags();
</script>
