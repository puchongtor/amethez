<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หินคริสตัล A-Z ทั้งหมด 72+ ชนิด | Amethez Crystal Atlas</title>
  <meta name="description" content="ค้นหาหินคริสตัลและพลอยทั้งหมดเรียงตามตัวอักษร A-Z พร้อมค้นหาด้วยชื่อและกรองตามสี — สารานุกรมหินที่ใหญ่ที่สุดในไทยโดย Crystal Atlas แห่ง Amethez">
  <link rel="canonical" href="https://amethez.com/stones/a-z.html">
  <meta property="og:site_name" content="Amethez">
  <meta property="og:type" content="website">
  <meta property="og:title" content="หินคริสตัล A-Z ทั้งหมด 72+ ชนิด | Amethez Crystal Atlas">
  <meta property="og:description" content="ค้นหาหินคริสตัลและพลอยทั้งหมดเรียงตามตัวอักษร A-Z พร้อมค้นหาด้วยชื่อและกรองตามสี">
  <meta property="og:url" content="https://amethez.com/stones/a-z.html">
  <meta property="og:image" content="https://amethez.com/images/og-default.jpg">
  <meta property="og:locale" content="th_TH">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    :root { --purple:#7c3aed; --gold:#c9a84c; --bg:#faf8f4; }

    /* ── Compact hero ── */
    .az-hero { background:linear-gradient(160deg,#1a1228 0%,#2d1b69 60%,#1a1228 100%);
      padding:3rem 1.5rem 2rem; text-align:center; }
    .az-hero .crumb { font-size:.85rem; color:rgba(255,255,255,.55); margin-bottom:.75rem; }
    .az-hero .crumb a { color:rgba(255,255,255,.55); }
    .az-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.7rem,4.5vw,2.4rem); color:white; margin-bottom:.4rem; }
    .az-hero p { color:rgba(255,255,255,.7); font-size:.95rem; }

    /* ── Search bar ── */
    .search-wrap { background:white; border-bottom:1px solid #f0e8ff; padding:1rem 1.5rem; }
    .search-inner { max-width:1100px; margin:0 auto; display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
    .search-inp { flex:1; min-width:200px; padding:.7rem 1rem .7rem 2.75rem; border:2px solid #e9e0f8;
      border-radius:.65rem; font-family:Sarabun,sans-serif; font-size:.95rem; color:#1a1228; box-sizing:border-box; }
    .search-inp:focus { outline:none; border-color:#7c3aed; }
    .search-wrap-rel { position:relative; flex:1; }
    .search-icon { position:absolute; left:.85rem; top:50%; transform:translateY(-50%); color:#9b89bb; pointer-events:none; }
    .filter-tabs { display:flex; gap:.4rem; flex-wrap:wrap; }
    .ftab { padding:.4rem .9rem; border-radius:2rem; font-size:.8rem; border:1.5px solid #e9e0f8;
      background:white; color:#6b5e8a; cursor:pointer; transition:all .15s; font-family:Sarabun,sans-serif; }
    .ftab:hover,.ftab.on { background:#7c3aed; border-color:#7c3aed; color:white; }

    /* ── Sticky Alphabet Bar ── */
    .alpha-bar { background:white; border-bottom:1px solid #f0e8ff; padding:.6rem 1rem;
      position:sticky; top:64px; z-index:80; overflow-x:auto; white-space:nowrap;
      box-shadow:0 2px 8px rgba(0,0,0,.04); }
    .alpha-bar-inner { display:flex; gap:.2rem; max-width:1100px; margin:0 auto; align-items:center; flex-wrap:nowrap; }
    .alpha-btn { min-width:30px; height:30px; border-radius:.35rem; border:none; background:transparent;
      font-size:.82rem; font-weight:600; color:#6b5e8a; cursor:pointer; transition:all .15s; padding:0 .25rem; }
    .alpha-btn:hover { background:#f3effa; color:#7c3aed; }
    .alpha-btn.active { background:#7c3aed; color:white; }
    .alpha-sep { color:#d1d5db; font-size:.7rem; padding:0 .15rem; }

    /* ── Stone Compact Grid ── */
    .atlas { padding:2rem 1.5rem 3.5rem; background:#faf8f4; }
    .atlas-header { max-width:1100px; margin:0 auto 1.5rem; display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap; }
    .atlas-title { font-family:'Playfair Display',serif; font-size:1.5rem; color:#1a1228; }
    .atlas-count { font-size:.82rem; color:#9b89bb; }
    .stone-grid { max-width:1100px; margin:0 auto;
      display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:1rem; }
    .sc { text-decoration:none; color:#1a1228; display:block; }
    .sc-img-wrap { position:relative; border-radius:.65rem; overflow:hidden;
      background:#f3effa; aspect-ratio:1; margin-bottom:.4rem; }
    .sc-img { width:100%; height:100%; object-fit:cover; display:block;
      transition:transform .25s; }
    .sc:hover .sc-img { transform:scale(1.05); }
    .sc-placeholder { width:100%; height:100%; display:flex; align-items:center;
      justify-content:center; font-size:2.5rem; }
    .sc-th { font-size:.88rem; font-weight:600; line-height:1.3; }
    .sc-en { font-size:.72rem; color:#9b89bb; }
    .no-result { max-width:1100px; margin:0 auto; text-align:center; color:#9b89bb; padding:3rem 1rem; display:none; }

    /* Color dots for placeholders */
    .bg-purple { background:linear-gradient(135deg,#ede9fe,#c4b5fd); }
    .bg-green  { background:linear-gradient(135deg,#d1fae5,#6ee7b7); }
    .bg-blue   { background:linear-gradient(135deg,#dbeafe,#93c5fd); }
    .bg-pink   { background:linear-gradient(135deg,#fce7f3,#f9a8d4); }
    .bg-yellow { background:linear-gradient(135deg,#fef3c7,#fde68a); }
    .bg-red    { background:linear-gradient(135deg,#fee2e2,#fca5a5); }
    .bg-black  { background:linear-gradient(135deg,#1f2937,#374151); }
    .bg-white  { background:linear-gradient(135deg,#f8fafc,#e2e8f0); }
    .bg-orange { background:linear-gradient(135deg,#ffedd5,#fdba74); }
    .bg-brown  { background:linear-gradient(135deg,#fef3c7,#b45309); }
    .bg-gold   { background:linear-gradient(135deg,#fef3c7,#c9a84c); }
    .bg-multi  { background:linear-gradient(135deg,#ede9fe,#d1fae5,#fce7f3); }
    .bg-clear  { background:linear-gradient(135deg,#f1f5f9,#e2e8f0); }

    @media(max-width:600px) {
      .stone-grid { grid-template-columns:repeat(3,1fr); gap:.65rem; }
    }
  </style>
</head>
<body>

<header class="site-header"></header>

<section class="az-hero">
  <div class="crumb"><a href="/">หน้าหลัก</a> › <a href="/stones/">สารานุกรมหิน</a> › A-Z ทั้งหมด</div>
  <h1>🔤 หินคริสตัล A-Z ทั้งหมด</h1>
  <p>ค้นหาหินคริสตัลและพลอยทุกชนิดเรียงตามตัวอักษร — พิมพ์ค้นหา หรือกดตัวอักษรเพื่อกรอง</p>
</section>

<!-- Search -->
<div class="search-wrap">
  <div class="search-inner">
    <div class="search-wrap-rel">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="stoneSearch" type="text"
        placeholder="ค้นหา เช่น อเมทิสต์, Rose Quartz, หินเรียกเงิน…"
        oninput="filterStones()">
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="ftab on" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button class="ftab" onclick="setFilter('purple',this)">💜 ม่วง</button>
      <button class="ftab" onclick="setFilter('green',this)">💚 เขียว</button>
      <button class="ftab" onclick="setFilter('pink',this)">🩷 ชมพู</button>
      <button class="ftab" onclick="setFilter('blue',this)">💙 น้ำเงิน</button>
      <button class="ftab" onclick="setFilter('yellow',this)">💛 เหลือง</button>
      <button class="ftab" onclick="setFilter('orange',this)">🧡 ส้ม</button>
      <button class="ftab" onclick="setFilter('red',this)">❤️ แดง</button>
      <button class="ftab" onclick="setFilter('black',this)">🖤 ดำ</button>
      <button class="ftab" onclick="setFilter('white',this)">🤍 ขาว</button>
      <button class="ftab" onclick="setFilter('gold',this)">✨ ทอง</button>
    </div>
  </div>
</div>

<!-- Alphabet Bar -->
<div class="alpha-bar">
  <div class="alpha-bar-inner">
    <button class="alpha-btn active" onclick="setLetter('',this)">ทั้งหมด</button>
    <span class="alpha-sep">|</span>
    <button class="alpha-btn" onclick="setLetter('A',this)">A</button>
    <button class="alpha-btn" onclick="setLetter('B',this)">B</button>
    <button class="alpha-btn" onclick="setLetter('C',this)">C</button>
    <button class="alpha-btn" onclick="setLetter('D',this)">D</button>
    <button class="alpha-btn" onclick="setLetter('E',this)">E</button>
    <button class="alpha-btn" onclick="setLetter('F',this)">F</button>
    <button class="alpha-btn" onclick="setLetter('G',this)">G</button>
    <button class="alpha-btn" onclick="setLetter('H',this)">H</button>
    <button class="alpha-btn" onclick="setLetter('I',this)">I</button>
    <button class="alpha-btn" onclick="setLetter('J',this)">J</button>
    <button class="alpha-btn" onclick="setLetter('K',this)">K</button>
    <button class="alpha-btn" onclick="setLetter('L',this)">L</button>
    <button class="alpha-btn" onclick="setLetter('M',this)">M</button>
    <button class="alpha-btn" onclick="setLetter('N',this)">N</button>
    <button class="alpha-btn" onclick="setLetter('O',this)">O</button>
    <button class="alpha-btn" onclick="setLetter('P',this)">P</button>
    <button class="alpha-btn" onclick="setLetter('Q',this)">Q</button>
    <button class="alpha-btn" onclick="setLetter('R',this)">R</button>
    <button class="alpha-btn" onclick="setLetter('S',this)">S</button>
    <button class="alpha-btn" onclick="setLetter('T',this)">T</button>
    <button class="alpha-btn" onclick="setLetter('U',this)">U</button>
    <button class="alpha-btn" onclick="setLetter('V',this)">V</button>
    <button class="alpha-btn" onclick="setLetter('Z',this)">Z</button>
  </div>
</div>

<!-- Grid -->
<div class="atlas">
  <div class="atlas-header">
    <span class="atlas-title">🪨 หินทั้งหมด</span>
    <span class="atlas-count" id="stoneCount"></span>
  </div>
  <div class="stone-grid" id="stoneGrid"></div>
  <div class="no-result" id="noResult">ไม่พบหินที่ค้นหา ลองคำอื่นดูนะครับ</div>
</div>

<script>
/* ═══ STONE DATA ═══ */
let STONES = [];
let curLetter = '', curFilter = 'all';
let cmsImgs = {};

function colorEmoji(col) {
  const map = {purple:'💜',green:'💚',blue:'💙',pink:'🩷',yellow:'💛',red:'❤️',
    black:'🖤',white:'🤍',orange:'🧡',brown:'🟤',gold:'✨',multi:'🌈',clear:'🔷'};
  return map[col] || '💎';
}

function renderStones() {
  const q = (document.getElementById('stoneSearch')?.value || '').toLowerCase();
  const grid = document.getElementById('stoneGrid');
  const count = document.getElementById('stoneCount');
  let visible = 0;
  grid.innerHTML = '';

  STONES.forEach(s => {
    const matchLetter = !curLetter || s.l === curLetter;
    const matchSearch = !q || s.th.includes(q) || s.en.toLowerCase().includes(q);
    const matchFilter = curFilter === 'all' || s.col === curFilter;
    if (!matchLetter || !matchSearch || !matchFilter) return;
    visible++;

    const el = document.createElement('a');
    el.className = 'sc';
    el.href = s.url;

    const imgUrl = cmsImgs[`stone_${s.img}_hero`] || '';
    el.innerHTML = `
      <div class="sc-img-wrap bg-${s.col}">
        <img class="sc-img" loading="lazy" alt="${s.th}"
          src="${imgUrl}" style="${imgUrl ? '' : 'display:none'}"
          onerror="this.style.display='none'">
        <div class="sc-placeholder">${colorEmoji(s.col)}</div>
      </div>
      <div class="sc-th">${s.th}</div>
      <div class="sc-en">${s.en}</div>`;
    grid.appendChild(el);
  });

  count.textContent = `${visible} ชนิด`;
  document.getElementById('noResult').style.display = visible ? 'none' : 'block';
}

function setLetter(l, btn) {
  curLetter = l;
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderStones();
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  renderStones();
}

function filterStones() { renderStones(); }

/* Load stone list + CMS images once, cache, then render (and re-render on every filter/letter/search change) */
(async () => {
  try {
    const r = await fetch('/data/stones-az.json?v=' + Date.now());
    if (r.ok) {
      const d = await r.json();
      STONES = d.stones || [];
    }
  } catch(e) {}
  try {
    const r2 = await fetch('/data/content.json?v=' + Date.now());
    if (r2.ok) {
      const d2 = await r2.json();
      cmsImgs = d2.images || {};
    }
  } catch(e) {}

  // Allow deep-linking a color filter from other pages, e.g. /stones/a-z.html?color=purple
  const urlColor = new URLSearchParams(location.search).get('color');
  if (urlColor) {
    curFilter = urlColor;
    document.querySelectorAll('.ftab').forEach(b => {
      const isMatch = b.getAttribute('onclick') === `setFilter('${urlColor}',this)`;
      b.classList.toggle('on', isMatch);
    });
  }

  renderStones();
})();
</script>

<script src="/js/cms.js"></script>
<footer class="site-footer"></footer>
<script src="/js/components.js"></script>
<script src="/js/shila.js"></script>
</body>
</html>
