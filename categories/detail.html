<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">สารานุกรมหิน | Amethez</title>
  <meta name="description" id="page-desc" content="ค้นหาหินคริสตัลตามหมวดหมู่ที่ต้องการ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    :root {
      --purple:#7c3aed; --gold:#c9a84c; --gold-light:#e8cf85; --bg:#faf8f4; --line:#ede9fe;
      --shadow-sm:0 1px 2px rgba(26,18,40,.05), 0 2px 8px rgba(26,18,40,.04);
      --shadow-md:0 8px 24px rgba(26,18,40,.08), 0 2px 6px rgba(124,58,237,.06);
      --shadow-lg:0 20px 48px rgba(26,18,40,.14), 0 4px 14px rgba(124,58,237,.1);
    }
    body { font-family:'Sarabun',sans-serif; background:var(--bg); color:#1a1228; -webkit-font-smoothing:antialiased; }
    .container { max-width:1040px; margin:0 auto; padding:0 1.25rem; }

    .kicker { display:inline-flex; align-items:center; gap:.5rem; font-size:.7rem; font-weight:700;
      letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:.5rem; }
    .kicker::before, .kicker::after { content:''; width:1.1rem; height:1px; background:currentColor; opacity:.55; }
    .kicker.on-dark { color:var(--gold-light); }

    /* ─── Hero ─── */
    .cat-hero {
      background:radial-gradient(ellipse 120% 90% at 50% -10%,#3a2470 0%,#1a1228 55%,#0f0a1e 100%);
      color:#fff; padding:4rem 0 3.5rem; text-align:center; position:relative; overflow:hidden;
    }
    .cat-hero::before {
      content:''; position:absolute; top:-120px; left:50%; transform:translateX(-50%);
      width:560px; height:560px; background:radial-gradient(ellipse,rgba(124,58,237,.32) 0%,transparent 65%); pointer-events:none;
    }
    .cat-hero::after {
      content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
      background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);
    }
    .cat-hero-emoji { font-size:4rem; display:block; margin-bottom:1rem; position:relative; filter:drop-shadow(0 4px 16px rgba(0,0,0,.35)); }
    .cat-hero h1 {
      font-family:'Playfair Display',serif; font-weight:800;
      font-size:clamp(1.85rem,4vw,2.85rem);
      margin:0 0 .6rem; position:relative; letter-spacing:-.01em;
    }
    .cat-hero .hero-sub { font-size:.95rem; color:rgba(237,229,254,.72); position:relative; }
    .hero-pills { display:flex; justify-content:center; flex-wrap:wrap; gap:.5rem; margin-top:1.4rem; position:relative; }
    .hero-pill { background:rgba(255,255,255,.08); border:1px solid rgba(201,168,76,.35); color:#fff; padding:.35rem .95rem; border-radius:2rem; font-size:.8rem; backdrop-filter:blur(4px); }

    /* ─── Breadcrumb ─── */
    .breadcrumb { padding:.875rem 0; font-size:.85rem; color:#9ca3af; }
    .breadcrumb a { color:var(--purple); text-decoration:none; }
    .breadcrumb a:hover { text-decoration:underline; }

    /* ─── Back button ─── */
    .back-btn {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.5rem 1.1rem; border:1.5px solid var(--purple);
      border-radius:2rem; color:var(--purple); text-decoration:none;
      font-size:.875rem; font-weight:600; margin-bottom:1.5rem; transition:all .25s;
    }
    .back-btn:hover { background:var(--purple); color:#fff; box-shadow:0 6px 18px rgba(124,58,237,.3); transform:translateY(-1px); }

    /* ─── Info cards ─── */
    .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:.875rem; margin-bottom:2rem; }
    .info-card { background:#fff; border:1px solid var(--line); border-radius:1rem; padding:1.35rem; text-align:center;
      box-shadow:var(--shadow-sm); transition:box-shadow .25s,transform .25s; }
    .info-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .info-card .ic-label { font-size:.7rem; color:#9ca3af; margin-bottom:.3rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
    .info-card .ic-value { font-size:.975rem; font-weight:700; color:#1a1228; }

    /* ─── Energy highlight ─── */
    .energy-highlight {
      background:linear-gradient(135deg,var(--purple),#9d5cf5 55%,#b478f7);
      color:#fff; padding:1.5rem 1.85rem; border-radius:1.1rem;
      font-size:1.05rem; font-style:italic; line-height:1.7;
      margin:1.75rem 0; position:relative; overflow:hidden; box-shadow:0 12px 32px rgba(124,58,237,.25);
    }
    .energy-highlight::before {
      content:'"'; position:absolute; top:-.75rem; left:.85rem;
      font-size:5.5rem; opacity:.18; font-family:'Playfair Display',serif; line-height:1;
    }
    .energy-highlight p { margin:0; position:relative; }

    /* ─── Intro paragraphs ─── */
    .intro-section { margin-bottom:2.5rem; }
    .intro-section h2 { font-family:'Playfair Display',serif; font-weight:700; font-size:1.45rem; color:#1a1228; margin:0 0 1.1rem; display:flex; align-items:center; gap:.5rem; }
    .intro-section p { font-size:1.025rem; line-height:1.9; color:#374151; margin-bottom:1rem; }

    /* ─── Stone detail cards ─── */
    .stones-section { margin-bottom:3rem; }
    .stones-section h2 { font-family:'Playfair Display',serif; font-weight:700; font-size:1.45rem; color:#1a1228; margin:0 0 1.35rem; display:flex; align-items:center; gap:.5rem; }
    .stone-detail-card {
      background:#fff; border:1px solid var(--line); border-radius:1.25rem;
      padding:0; margin-bottom:1.25rem; overflow:hidden; transition:box-shadow .25s,transform .25s;
      box-shadow:var(--shadow-sm);
    }
    .stone-detail-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
    .sdc-header {
      display:flex; align-items:center; gap:1rem; padding:1.35rem 1.5rem;
      border-bottom:1px solid #f3f0ff; background:linear-gradient(135deg,#faf8ff,#fff);
    }
    .sdc-emoji-wrap {
      width:3.5rem; height:3.5rem; border-radius:1rem; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:1.75rem;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    .sdc-header-text {}
    .sdc-name { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; }
    .sdc-name-en { font-size:.8rem; color:#9ca3af; }
    .sdc-title { font-size:.875rem; color:var(--purple); font-weight:600; margin-top:.15rem; }
    .sdc-body { padding:1.35rem 1.5rem; }
    .sdc-meaning { font-size:1rem; line-height:1.85; color:#374151; margin-bottom:1.25rem; }
    .sdc-meta { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .sdc-how, .sdc-best { background:var(--bg); border-radius:.85rem; padding:1.1rem; }
    .sdc-how h4, .sdc-best h4 { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:#9ca3af; margin:0 0 .5rem; font-weight:700; }
    .sdc-how p { font-size:.9rem; color:#4b5563; line-height:1.7; margin:0; }
    .sdc-best-tags { display:flex; flex-wrap:wrap; gap:.35rem; }
    .sdc-best-tag { background:#ede9fe; color:var(--purple); padding:.25rem .75rem; border-radius:2rem; font-size:.775rem; font-weight:600; }

    /* Simple stone list (fallback for zodiac/chakra without rich content) */
    .stones-grid-simple { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stone-card-simple {
      background:#fff; border:1px solid var(--line); border-radius:1rem;
      padding:1.1rem 1.2rem; text-decoration:none; color:#1a1228;
      transition:all .25s cubic-bezier(.4,0,.2,1); display:flex; align-items:center; gap:.875rem;
      box-shadow:var(--shadow-sm);
    }
    .stone-card-simple:hover { border-color:transparent; transform:translateY(-3px); box-shadow:var(--shadow-md); }
    .stone-card-simple .sc-icon { font-size:1.5rem; flex-shrink:0; }
    .stone-card-simple .sc-name { font-weight:600; font-size:.95rem; }
    .stone-card-simple .sc-en { font-size:.75rem; color:#9ca3af; }

    /* ─── Tips section ─── */
    .tips-section { margin-bottom:3rem; }
    .tips-section h2 { font-family:'Playfair Display',serif; font-weight:700; font-size:1.45rem; color:#1a1228; margin:0 0 1.35rem; display:flex; align-items:center; gap:.5rem; }
    .tips-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
    .tip-card { background:#fff; border:1px solid var(--line); border-radius:1.125rem; padding:1.6rem;
      box-shadow:var(--shadow-sm); transition:box-shadow .25s,transform .25s; position:relative; overflow:hidden; }
    .tip-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--purple),var(--gold)); }
    .tip-card:hover { box-shadow:var(--shadow-md); transform:translateY(-3px); }
    .tip-icon { font-size:2rem; margin-bottom:.75rem; display:block; }
    .tip-title { font-weight:700; font-size:.975rem; margin-bottom:.5rem; color:#1a1228; }
    .tip-text { font-size:.9rem; line-height:1.75; color:#4b5563; }

    /* ─── FAQ ─── */
    .faq-section { margin-bottom:3rem; }
    .faq-section h2 { font-family:'Playfair Display',serif; font-weight:700; font-size:1.45rem; color:#1a1228; margin:0 0 1.35rem; display:flex; align-items:center; gap:.5rem; }
    .faq-item { border:1px solid var(--line); border-radius:1rem; margin-bottom:.75rem; overflow:hidden; box-shadow:var(--shadow-sm); transition:box-shadow .2s; }
    .faq-item:hover { box-shadow:var(--shadow-sm), 0 4px 12px rgba(124,58,237,.06); }
    .faq-q {
      padding:1.1rem 1.35rem; font-weight:700; font-size:.975rem; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between; gap:1rem;
      background:#fff; transition:background .15s;
    }
    .faq-q:hover { background:#faf8f4; }
    .faq-q .faq-arrow { color:var(--purple); font-size:1.1rem; transition:transform .25s; flex-shrink:0; }
    .faq-a { padding:0 1.35rem; max-height:0; overflow:hidden; transition:max-height .3s ease,padding .3s; }
    .faq-a p { margin:0; padding-bottom:1.1rem; font-size:.95rem; line-height:1.8; color:#4b5563; }
    .faq-item.open .faq-a { max-height:400px; padding-top:.125rem; }
    .faq-item.open .faq-arrow { transform:rotate(90deg); }

    /* ─── Shopee Aff Section ─── */
    .aff-section {
      background:linear-gradient(160deg,#fffdf5,#fff9e8); border:1.5px solid #fde68a; border-radius:1.5rem;
      padding:2rem; margin-top:1rem; box-shadow:0 8px 28px rgba(238,77,45,.06);
    }
    .aff-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:.75rem; }
    .aff-title { font-family:'Playfair Display',serif; font-weight:700; font-size:1.25rem; color:#1a1228; }
    .aff-badge { background:linear-gradient(135deg,#ee4d2d,#f97316); color:#fff; padding:.3rem .875rem; border-radius:2rem; font-size:.8rem; font-weight:700; box-shadow:0 4px 12px rgba(238,77,45,.3); }
    .aff-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:1rem; }
    .aff-card { border:1.5px solid #fde68a; border-radius:1rem; overflow:hidden; transition:all .25s; text-decoration:none; color:#1a1228; display:block; background:#fff; box-shadow:0 2px 8px rgba(238,77,45,.05); }
    .aff-card:hover { border-color:#f97316; box-shadow:0 10px 28px rgba(249,115,22,.18); transform:translateY(-3px); }
    .aff-img { width:100%; aspect-ratio:1; object-fit:cover; background:#f3f4f6; display:block; }
    .aff-img-placeholder { width:100%; aspect-ratio:1; background:linear-gradient(135deg,#fef3c7,#fde68a); display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
    .aff-info { padding:.875rem; }
    .aff-name { font-weight:600; font-size:.875rem; line-height:1.4; margin-bottom:.35rem; }
    .aff-store { font-size:.72rem; color:#9ca3af; margin-bottom:.2rem; }
    .aff-price { color:#ee4d2d; font-weight:700; font-size:1rem; }
    .aff-btn-row { display:flex; align-items:center; gap:.35rem; margin:.25rem .875rem .75rem; }
    .aff-btn { color:#ee4d2d; font-size:.72rem; font-weight:600; flex:1; min-width:0; }
    .aff-copy-btn { border:1px solid #fde68a; background:#fffbeb; color:#ee4d2d; border-radius:.4rem; padding:.2rem .4rem; font-size:.72rem; line-height:1; cursor:pointer; flex-shrink:0; }
    .load-more-btn { display:block; width:100%; margin-top:1.25rem; padding:.875rem; background:#fff; border:2px solid #ee4d2d; color:#ee4d2d; border-radius:.875rem; font-size:.95rem; font-weight:700; cursor:pointer; transition:all .2s; font-family:'Sarabun',sans-serif; }
    .load-more-btn:hover { background:#ee4d2d; color:#fff; }
    .aff-empty { text-align:center; padding:2rem; color:#9ca3af; font-size:.9rem; }

    /* divider */
    .section-divider { border:none; height:1px; background:linear-gradient(90deg,transparent,var(--line) 15%,var(--line) 85%,transparent);
      margin:2.75rem 0; position:relative; }
    .section-divider::after { content:'◆'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      color:var(--gold); font-size:.65rem; background:var(--bg); padding:0 .75rem; }

    /* Loading */
    .loading-state { text-align:center; padding:4rem 2rem; color:#9ca3af; }
    .loading-spinner { width:2.5rem; height:2.5rem; border:3px solid #ede9fe; border-top-color:var(--purple); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:640px) {
      .sdc-meta { grid-template-columns:1fr; }
      .aff-grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>
<header class="site-header"></header>

<main>
  <div class="cat-hero" id="hero">
    <div class="container">
      <img id="hero-photo" alt="" style="width:180px;height:180px;border-radius:50%;object-fit:cover;margin:0 auto 1.25rem;display:none;border:3px solid rgba(255,255,255,.25);box-shadow:0 0 40px rgba(124,58,237,.4);position:relative">
      <span class="cat-hero-emoji" id="hero-emoji">💎</span>
      <p class="kicker on-dark" id="hero-kicker" style="justify-content:center;display:flex"></p>
      <h1 id="hero-title">กำลังโหลด...</h1>
      <p class="hero-sub" id="hero-sub"></p>
      <div class="hero-pills" id="hero-pills"></div>
    </div>
  </div>

  <div class="container" style="padding-top:1rem;padding-bottom:3rem">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div id="main-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>กำลังโหลดข้อมูล...</p>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"></footer>
<script src="/js/cms.js"></script>
<script src="/js/components.js"></script>
<script src="/js/main.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const catType = params.get('type');
  const itemId  = params.get('id');

  const TYPE_CONFIG = {
    zodiac:  { label:'ราศี',          back:'/categories/zodiac.html',   icon:'♈', contentFile:'/data/content-zodiac.json' },
    chakra:  { label:'จักระ',         back:'/categories/chakra.html',   icon:'🧘', contentFile:'/data/content-chakra.json' },
    planet:  { label:'ดาวเคราะห์',    back:'/categories/planet.html',   icon:'🪐', contentFile:'/data/content-planet.json' },
    element: { label:'ธาตุ',          back:'/categories/element.html',  icon:'🔥', contentFile:'/data/content-element.json' },
    purpose: { label:'วัตถุประสงค์',  back:'/categories/purpose.html',  icon:'✨', contentFile:'/data/content-purpose.json' },
    numerology: { label:'เลขศาสตร์', back:'/categories/numerology.html', icon:'🔢', contentFile:'/data/content-numerology.json' }
  };

  const STONE_EMOJI = {
    amethyst:'💜','clear-quartz':'🔮',citrine:'💛','rose-quartz':'🌸',moldavite:'💚',
    labradorite:'✨',moonstone:'🌙',obsidian:'⚫','black-tourmaline':'🖤',carnelian:'🧡',
    'lapis-lazuli':'💙',aquamarine:'💎',selenite:'🤍',malachite:'🍀',jade:'💚',
    tektite:'🪨',pyrite:'🥇',sunstone:'☀️','green-aventurine':'🍃','blue-lace-agate':'🩵',
    bloodstone:'🩸',rhodonite:'💗'
  };

  function slug2name(id){ return id.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
  function emo(id){ return STONE_EMOJI[id]||'💎'; }

  async function loadAll(){
    const cfg = TYPE_CONFIG[catType] || {};
    const fetches = [fetch('/data/categories.json'), fetch('/data/products.json'), fetch('/data/content.json')];
    if(cfg.contentFile) fetches.push(fetch(cfg.contentFile));
    const results = await Promise.all(fetches.map(f=>f.then(r=>r.json()).catch(()=>null)));
    return { cats:results[0], products:(results[1]||{}).products||[], imgs:(results[2]||{}).images||{}, richContent:results[3]||null };
  }

  // Chakra detail pages have a dedicated hero photo slot per item (added in
  // Admin — group "จักระ"), keyed chakra_root / chakra_third_eye / etc.
  // Other category types don't have these slots yet, so this only applies
  // to type=chakra and gracefully falls back to the emoji when no image
  // has been uploaded/published.
  function heroImgSlotKey(itemId, type){
    if(type!=='chakra') return null;
    return 'chakra_' + itemId.replace(/-/g,'_');
  }

  function updateHero(item, type, imgs){
    const cfg = TYPE_CONFIG[type]||{};
    document.getElementById('page-title').textContent = `${item.name} | ${cfg.label||type} | Amethez`;
    document.getElementById('page-desc').setAttribute('content', item.description||'');
    document.getElementById('hero-kicker').textContent = cfg.label || type;
    document.getElementById('hero-title').textContent = item.name + (item.name_en ? ' — '+item.name_en : '');
    document.getElementById('hero-sub').textContent = buildSub(item,type);
    const pillsEl = document.getElementById('hero-pills');
    if(item.traits) pillsEl.innerHTML = item.traits.map(t=>`<span class="hero-pill">${t}</span>`).join('');
    if(item.color){
      document.getElementById('hero').style.background =
        `linear-gradient(135deg,#1a1228 0%,${item.color}33 50%,#0f0a1e 100%)`;
    }
    const slotKey = heroImgSlotKey(item.id, type);
    const photoUrl = slotKey && imgs ? imgs[slotKey] : null;
    const photoEl = document.getElementById('hero-photo');
    const emojiEl = document.getElementById('hero-emoji');
    if(photoUrl){
      photoEl.src = photoUrl;
      photoEl.style.display = 'block';
      emojiEl.style.display = 'none';
    } else {
      photoEl.style.display = 'none';
      emojiEl.style.display = '';
      emojiEl.textContent = item.emoji||cfg.icon||'💎';
    }
  }

  function buildSub(item,type){
    if(type==='zodiac') return [item.dates,item.element?'ธาตุ'+item.element:'',item.planet].filter(Boolean).join(' · ');
    if(type==='chakra') return [item.sanskrit,item.location,item.frequency].filter(Boolean).join(' · ');
    if(type==='planet') return 'ปกครอง '+(item.rules||'');
    if(type==='element') return item.name_en||'';
    return '';
  }

  function buildInfoCards(item, type){
    const items=[];
    if(type==='zodiac'){
      if(item.dates)   items.push({l:'📅 ช่วงเวลา',v:item.dates});
      if(item.element) items.push({l:'🔥 ธาตุ',v:item.element});
      if(item.planet)  items.push({l:'🪐 ดาวเคราะห์',v:item.planet});
    }
    if(type==='chakra'){
      if(item.sanskrit)  items.push({l:'สันสกฤต',v:item.sanskrit});
      if(item.location)  items.push({l:'📍 ตำแหน่ง',v:item.location});
      if(item.element)   items.push({l:'🌿 ธาตุ',v:item.element});
      if(item.frequency) items.push({l:'🎵 ความถี่',v:item.frequency});
    }
    if(type==='planet') if(item.rules) items.push({l:'♈ ปกครอง',v:item.rules});
    if(!items.length) return '';
    return `<div class="info-grid">${items.map(i=>`<div class="info-card"><div class="ic-label">${i.l}</div><div class="ic-value">${i.v}</div></div>`).join('')}</div>`;
  }

  function buildRichContent(item, rich){
    if(!rich) return buildSimpleContent(item);
    let html = '';

    // Intro paragraphs
    if(rich.intro && rich.intro.length){
      html += `<div class="intro-section">
        <h2>✨ พลังงานและความหมาย</h2>
        ${rich.intro.map(p=>`<p>${p}</p>`).join('')}
      </div>`;
    }

    // Energy highlight quote
    if(rich.energy_highlight){
      html += `<div class="energy-highlight"><p>${rich.energy_highlight}</p></div>`;
    }

    // Stone details
    if(rich.stone_details && rich.stone_details.length){
      html += `<div class="stones-section">
        <h2>💎 หินคริสตัลที่แนะนำ</h2>
        ${rich.stone_details.map(s=>`
          <div class="stone-detail-card">
            <div class="sdc-header">
              <div class="sdc-emoji-wrap" style="background:${s.color||'#ede9fe'}">${s.emoji||emo(s.id)}</div>
              <div class="sdc-header-text">
                <div class="sdc-name">${s.name}</div>
                <div class="sdc-name-en">${s.name_en||''}</div>
                <div class="sdc-title">✦ ${s.title||''}</div>
              </div>
            </div>
            <div class="sdc-body">
              <p class="sdc-meaning">${s.meaning||''}</p>
              <div class="sdc-meta">
                <div class="sdc-how">
                  <h4>🙌 วิธีใช้</h4>
                  <p>${s.how_to_use||''}</p>
                </div>
                <div class="sdc-best">
                  <h4>⭐ เหมาะสำหรับ</h4>
                  <div class="sdc-best-tags">${(s.best_for||[]).map(t=>`<span class="sdc-best-tag">${t}</span>`).join('')}</div>
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
    }

    // Tips
    if(rich.tips && rich.tips.length){
      html += `<hr class="section-divider">
      <div class="tips-section">
        <h2>💡 เทคนิคและวิธีใช้</h2>
        <div class="tips-grid">
          ${rich.tips.map(t=>`
            <div class="tip-card">
              <span class="tip-icon">${t.icon||'💡'}</span>
              <div class="tip-title">${t.title}</div>
              <div class="tip-text">${t.text}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }

    // FAQ
    if(rich.faq && rich.faq.length){
      html += `<hr class="section-divider">
      <div class="faq-section">
        <h2>❓ คำถามที่พบบ่อย</h2>
        ${rich.faq.map((f,i)=>`
          <div class="faq-item" id="faq-${i}">
            <div class="faq-q" onclick="toggleFaq(${i})">
              <span>${f.q}</span>
              <span class="faq-arrow">›</span>
            </div>
            <div class="faq-a"><p>${f.a}</p></div>
          </div>`).join('')}
      </div>`;
    }

    return html;
  }

  function buildSimpleContent(item){
    let html = '';
    // Description
    if(item.description){
      html += `<div class="intro-section"><p>${item.description}</p></div>`;
    }
    // Simple stone cards
    if(item.stones && item.stones.length){
      html += `<div class="stones-section">
        <h2>💎 หินที่แนะนำ</h2>
        <div class="stones-grid-simple">
          ${item.stones.map((id,idx)=>{
            const name = (item.stone_names&&item.stone_names[idx])||slug2name(id);
            return `<a href="/stones/${id}.html" class="stone-card-simple">
              <span class="sc-icon">${emo(id)}</span>
              <div><div class="sc-name">${name}</div><div class="sc-en">${slug2name(id)}</div></div>
            </a>`;
          }).join('')}
        </div>
      </div>`;
    }
    return html;
  }

  function buildAffSection(item, allProducts){
    // stone_tags เป็นแค่คำทั่วไป/วัตถุประสงค์ (เช่น "จิตวิญญาณ","สมาธิ") —
    // ไม่เคยรวม stone_names (ชื่อหินจริงที่ผูกกับหมวดนี้ เช่น "อเมทิสต์")
    // เข้ามาด้วยเลย ทั้งที่มีอยู่แล้วในข้อมูล นี่คือสาเหตุหลักที่สินค้า
    // แนะนำไม่ตรงกับหมวด — ต้องรวมทั้งคู่เข้าเป็น keyword set เดียว
    const tags = [...(item.stone_tags||[]), ...(item.stone_names||[])];
    // ใช้ตัวจับคู่ให้คะแนนความเกี่ยวข้องร่วมกับหน้าบทความหิน (js/main.js) —
    // ก่อนหน้านี้ทั้งสองที่ต่างคนต่างเขียน filter เอง ผลลัพธ์เลยไม่ตรงกัน
    const matched = rankProductsByRelevance(allProducts, tags);

    const header = `<div class="aff-header">
      <div class="aff-title">✨ สินค้าแนะนำ</div>
    </div>`;

    if(!matched.length){
      return `<div class="aff-section">${header}<div class="aff-empty">กำลังรวบรวมสินค้า — กลับมาเร็วๆ นี้<br><small>เพิ่มสินค้าผ่าน Admin Panel → Shopee Aff</small></div></div>`;
    }

    window._affAll = matched;
    window._affShown = 4;

    function legacyCopy(text){
      return new Promise((resolve, reject) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try{
          document.execCommand('copy') ? resolve() : reject(new Error('execCommand failed'));
        }catch(e){ reject(e); }
        finally{ document.body.removeChild(ta); }
      });
    }
    window.copyAffLink = function(e, url){
      e.preventDefault();
      e.stopPropagation();
      const btn = e.currentTarget;
      const orig = btn.textContent;
      const write = (navigator.clipboard && navigator.clipboard.writeText)
        ? navigator.clipboard.writeText(url).catch(() => legacyCopy(url))
        : legacyCopy(url);
      write.then(()=>{
        btn.textContent = '✅';
        setTimeout(()=>{ btn.textContent = orig; }, 1200);
      }).catch(()=>{
        btn.textContent = '❌';
        setTimeout(()=>{ btn.textContent = orig; }, 1200);
      });
    }

    function card(p){
      const img = p.image_url
        ? `<img class="aff-img" src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const placeholder = `<div class="aff-img-placeholder" ${p.image_url?'style="display:none"':''}>🛒</div>`;
      const storeLine = p.store ? `<div class="aff-store">${p.store}</div>` : '';
      const storeSafe = (p.store||'').replace(/'/g,"");
      return `<a href="${p.url}" target="_blank" rel="noopener noreferrer nofollow" class="aff-card" onclick="if(typeof gtag==='function')gtag('event','shopee_click',{store:'${storeSafe}'})">
        ${img}${placeholder}
        <div class="aff-info">
          ${storeLine}
          <div class="aff-name">${p.name}</div>
          <div class="aff-price">฿${Number(p.price).toLocaleString()}</div>
        </div>
        <div class="aff-btn-row">
          <span class="aff-btn">&raquo; สั่งซื้อผ่านทาง Shopee</span>
          <button class="aff-copy-btn" title="คัดลอกลิงก์" onclick="copyAffLink(event,'${p.url}')">📋</button>
        </div>
      </a>`;
    }

    const initialHTML = matched.slice(0,4).map(card).join('');
    const remaining = matched.length - 4;

    return `<div class="aff-section">${header}
      <div class="aff-grid" id="aff-grid">${initialHTML}</div>
      ${remaining>0?`<button class="load-more-btn" id="aff-more-btn" onclick="loadMoreAff()">ดูเพิ่มเติม (${remaining} รายการ) ↓</button>`:''}
    </div>`;
  }

  window.loadMoreAff = function(){
    const grid = document.getElementById('aff-grid');
    const btn  = document.getElementById('aff-more-btn');
    const products = window._affAll||[];
    const start = window._affShown;
    products.slice(start, start+4).forEach(p=>{
      const div = document.createElement('div');
      div.innerHTML = (() => {
        const img = p.image_url ? `<img class="aff-img" src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
        const ph = `<div class="aff-img-placeholder" ${p.image_url?'style="display:none"':''}>🛒</div>`;
        return `<a href="${p.url}" target="_blank" rel="noopener noreferrer nofollow" class="aff-card">${img}${ph}<div class="aff-info"><div class="aff-name">${p.name}</div><div class="aff-price">฿${Number(p.price).toLocaleString()}</div></div><div class="aff-btn">ดูบน Shopee →</div></a>`;
      })();
      grid.appendChild(div.firstChild);
    });
    window._affShown += 4;
    const rem = products.length - window._affShown;
    if(rem<=0) btn.remove();
    else btn.textContent = `ดูเพิ่มเติม (${rem} รายการ) ↓`;
  };

  window.toggleFaq = function(i){
    const el = document.getElementById('faq-'+i);
    el.classList.toggle('open');
  };

  // ── Main ──
  loadAll().then(({cats,products,imgs,richContent})=>{
    if(!catType||!itemId){
      document.getElementById('main-content').innerHTML='<p style="text-align:center;padding:3rem;color:#9ca3af">ไม่พบข้อมูล — กรุณาระบุ type และ id</p>';
      return;
    }
    const list = cats[catType]||[];
    const item = list.find(i=>i.id===itemId);
    if(!item){
      document.getElementById('main-content').innerHTML=`<p style="text-align:center;padding:3rem;color:#9ca3af">ไม่พบข้อมูลสำหรับ "${itemId}"</p>`;
      return;
    }

    const cfg = TYPE_CONFIG[catType]||{};
    const rich = richContent && richContent[itemId] || null;

    updateHero(item, catType, imgs);

    const infoCards = buildInfoCards(item, catType);
    const mainContent = rich ? buildRichContent(item, rich) : buildSimpleContent(item);
    const affSection = buildAffSection(item, products);

    document.getElementById('breadcrumb').innerHTML =
      `<a href="/stones/">📖 สารานุกรมหิน</a> › <a href="${cfg.back||'#'}">${cfg.label||catType}</a> › ${item.name}`;

    document.getElementById('main-content').innerHTML = `
      <a href="${cfg.back||'#'}" class="back-btn">← กลับ${cfg.label?'หน้า'+cfg.label:''}</a>
      ${infoCards}
      ${mainContent}
      <hr class="section-divider">
      ${affSection}
    `;
  }).catch(err=>{
    document.getElementById('main-content').innerHTML=`<p style="text-align:center;padding:3rem;color:#ef4444">เกิดข้อผิดพลาด: ${err.message}</p>`;
  });
})();
</script>
<script src="/js/shila.js"></script>
</body>
</html>
