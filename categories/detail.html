<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">สารานุกรมหิน | Amethez</title>
  <meta name="description" id="page-desc" content="ค้นหาหินคริสตัลตามหมวดหมู่ที่ต้องการ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #faf8f4; color: #1a1228; }

    /* ─── Hero ─── */
    .cat-hero {
      background: linear-gradient(135deg, #2d1b69 0%, #1a1228 60%, #0f0a1e 100%);
      color: #fff;
      padding: 3.5rem 0 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cat-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.35) 0%, transparent 65%);
    }
    .cat-hero-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      position: relative;
    }
    .cat-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      margin: 0 0 .5rem;
      position: relative;
    }
    .cat-hero .hero-sub {
      font-size: 1rem;
      opacity: .75;
      position: relative;
    }
    .cat-hero .hero-pills {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: 1.25rem;
      position: relative;
    }
    .hero-pill {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      padding: .3rem .85rem;
      border-radius: 2rem;
      font-size: .825rem;
    }

    /* ─── Content ─── */
    .container { max-width: 1080px; margin: 0 auto; padding: 0 1.25rem; }
    .cat-content { padding: 2.5rem 0; }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .info-card {
      background: #fff;
      border: 1.5px solid #ede9fe;
      border-radius: 1rem;
      padding: 1.25rem;
      text-align: center;
    }
    .info-card .ic-label { font-size: .75rem; color: #9ca3af; margin-bottom: .25rem; }
    .info-card .ic-value { font-size: 1rem; font-weight: 700; color: #1a1228; }

    /* Description */
    .cat-desc {
      background: #fff;
      border-left: 4px solid #7c3aed;
      border-radius: 0 1rem 1rem 0;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 1.05rem;
      line-height: 1.8;
      color: #374151;
    }

    /* Stones section */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: #1a1228;
      margin: 0 0 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .stones-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }
    .stone-card {
      background: #fff;
      border: 1.5px solid #ede9fe;
      border-radius: 1rem;
      padding: 1.25rem;
      text-decoration: none;
      color: #1a1228;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: .875rem;
    }
    .stone-card:hover {
      border-color: #7c3aed;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124,58,237,.15);
    }
    .stone-icon {
      width: 2.5rem; height: 2.5rem;
      border-radius: .625rem;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .stone-name { font-weight: 600; font-size: .95rem; }
    .stone-name-en { font-size: .75rem; color: #9ca3af; }

    /* ─── Shopee Aff Section ─── */
    .aff-section {
      background: #fff;
      border-radius: 1.5rem;
      padding: 2rem;
      margin-top: 2rem;
      border: 1.5px solid #fde68a;
    }
    .aff-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .aff-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #1a1228;
    }
    .aff-badge {
      background: linear-gradient(135deg, #ee4d2d, #f97316);
      color: #fff;
      padding: .3rem .875rem;
      border-radius: 2rem;
      font-size: .8rem;
      font-weight: 700;
    }
    .aff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .aff-card {
      border: 1.5px solid #fde68a;
      border-radius: 1rem;
      overflow: hidden;
      transition: all .2s;
      text-decoration: none;
      color: #1a1228;
      display: block;
    }
    .aff-card:hover {
      border-color: #f97316;
      box-shadow: 0 4px 16px rgba(249,115,22,.15);
      transform: translateY(-2px);
    }
    .aff-img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      background: #f3f4f6;
    }
    .aff-img-placeholder {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .aff-info { padding: .875rem; }
    .aff-name { font-weight: 600; font-size: .9rem; line-height: 1.4; margin-bottom: .375rem; }
    .aff-price { color: #ee4d2d; font-weight: 700; font-size: 1.05rem; }
    .aff-btn {
      display: block;
      margin: .625rem .875rem .875rem;
      background: linear-gradient(135deg, #ee4d2d, #f97316);
      color: #fff;
      text-align: center;
      padding: .5rem;
      border-radius: .625rem;
      font-size: .85rem;
      font-weight: 700;
      text-decoration: none;
    }
    .aff-btn:hover { opacity: .9; }

    .load-more-btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: .875rem;
      background: #fff;
      border: 2px solid #ee4d2d;
      color: #ee4d2d;
      border-radius: .875rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Sarabun', sans-serif;
    }
    .load-more-btn:hover { background: #ee4d2d; color: #fff; }

    .aff-empty {
      text-align: center;
      padding: 2rem;
      color: #9ca3af;
    }

    /* Breadcrumb */
    .breadcrumb {
      padding: .875rem 0;
      font-size: .85rem;
      color: #9ca3af;
    }
    .breadcrumb a { color: #7c3aed; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #9ca3af;
    }
    .loading-spinner {
      width: 2.5rem; height: 2.5rem;
      border: 3px solid #ede9fe;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem 1.125rem;
      border: 1.5px solid #7c3aed;
      border-radius: 2rem;
      color: #7c3aed;
      text-decoration: none;
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      transition: all .2s;
    }
    .back-btn:hover { background: #7c3aed; color: #fff; }

    @media (max-width: 640px) {
      .cat-hero { padding: 2.5rem 1rem 2rem; }
      .aff-grid { grid-template-columns: repeat(2, 1fr); }
      .stones-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<header class="site-header"></header>

<main>
  <div class="cat-hero" id="hero">
    <div class="container">
      <span class="cat-hero-emoji" id="hero-emoji">💎</span>
      <h1 id="hero-title">กำลังโหลด...</h1>
      <p class="hero-sub" id="hero-sub"></p>
      <div class="hero-pills" id="hero-pills"></div>
    </div>
  </div>

  <div class="container">
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <div id="main-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>กำลังโหลดข้อมูล...</p>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"></footer>
<script src="/js/components.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const catType = params.get('type');   // zodiac | chakra | planet | element | purpose
  const itemId  = params.get('id');     // aries | root | sun | fire | love

  const TYPE_CONFIG = {
    zodiac:  { label: 'ราศี',           back: '/categories/zodiac.html',   icon: '♈' },
    chakra:  { label: 'จักระ',          back: '/categories/chakra.html',   icon: '🧘' },
    planet:  { label: 'ดาวเคราะห์',     back: '/categories/planet.html',   icon: '🪐' },
    element: { label: 'ธาตุ',           back: '/categories/element.html',  icon: '🔥' },
    purpose: { label: 'วัตถุประสงค์',   back: '/categories/purpose.html',  icon: '✨' }
  };

  const STONE_EMOJI = {
    amethyst: '💜', 'clear-quartz': '🔮', citrine: '💛', 'rose-quartz': '🌸',
    moldavite: '💚', labradorite: '✨', moonstone: '🌙', obsidian: '⚫',
    'black-tourmaline': '🖤', carnelian: '🧡', 'lapis-lazuli': '💙',
    aquamarine: '💎', selenite: '🤍', malachite: '🍀', jade: '💚',
    tektite: '🪨', pyrite: '🥇', sunstone: '☀️', labradorite: '🌈',
    'green-aventurine': '🍃', 'blue-lace-agate': '🩵', bloodstone: '🩸'
  };

  function getStoneEmoji(id) {
    return STONE_EMOJI[id] || '💎';
  }

  function formatStoneName(id) {
    return id.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  async function loadData() {
    const [catRes, prodRes] = await Promise.all([
      fetch('/data/categories.json'),
      fetch('/data/products.json')
    ]);
    const cats = await catRes.json();
    const prods = await prodRes.json();
    return { cats, products: prods.products || [] };
  }

  function renderDetail(item, type, products) {
    const cfg = TYPE_CONFIG[type] || {};

    // Update <head>
    const titleEl = document.getElementById('page-title');
    if (titleEl) titleEl.textContent = `${item.name} | สารานุกรมหิน | Amethez`;
    const descEl = document.getElementById('page-desc');
    if (descEl) descEl.setAttribute('content', item.description || '');

    // Update hero
    document.getElementById('hero-emoji').textContent = item.emoji || cfg.icon || '💎';
    document.getElementById('hero-title').textContent = `${item.name} ${item.name_en ? '— ' + item.name_en : ''}`;
    document.getElementById('hero-sub').textContent = buildHeroSub(item, type);

    // Hero pills (traits)
    const pillsEl = document.getElementById('hero-pills');
    if (item.traits) {
      pillsEl.innerHTML = item.traits.map(t => `<span class="hero-pill">${t}</span>`).join('');
    }

    // Hero bg accent color
    const hero = document.getElementById('hero');
    if (item.color) {
      hero.style.background = `linear-gradient(135deg, #1a1228 0%, ${item.color}22 100%)`;
    }

    // Breadcrumb
    document.getElementById('breadcrumb').innerHTML =
      `<a href="/stones/">📖 สารานุกรมหิน</a> › <a href="${cfg.back || '#'}">${cfg.label || type}</a> › ${item.name}`;

    // Build info cards
    const infoItems = buildInfoItems(item, type);

    // Build stones list
    const stonesHTML = buildStonesHTML(item);

    // Build Shopee Aff section
    const affHTML = buildAffSection(item, products);

    document.getElementById('main-content').innerHTML = `
      <a href="${cfg.back || '#'}" class="back-btn">← กลับ${cfg.label ? 'หน้า' + cfg.label : ''}</a>

      ${infoItems.length ? `<div class="info-grid">${infoItems.map(i =>
        `<div class="info-card"><div class="ic-label">${i.label}</div><div class="ic-value">${i.value}</div></div>`
      ).join('')}</div>` : ''}

      <div class="cat-desc">${item.description || ''}</div>

      ${stonesHTML}

      ${affHTML}
    `;
  }

  function buildHeroSub(item, type) {
    if (type === 'zodiac') return `${item.dates || ''} · ธาตุ${item.element || ''} · ${item.planet || ''}`;
    if (type === 'chakra') return `${item.sanskrit || ''} · ${item.location || ''} · ${item.frequency || ''}`;
    if (type === 'planet') return `ปกครอง ${item.rules || ''}`;
    if (type === 'element') return item.description ? item.description.substring(0, 60) + '...' : '';
    return '';
  }

  function buildInfoItems(item, type) {
    const items = [];
    if (type === 'zodiac') {
      if (item.dates)   items.push({ label: '📅 ช่วงเวลา', value: item.dates });
      if (item.element) items.push({ label: '🔥 ธาตุ', value: item.element });
      if (item.planet)  items.push({ label: '🪐 ดาวเคราะห์', value: item.planet });
    }
    if (type === 'chakra') {
      if (item.sanskrit)  items.push({ label: 'สันสกฤต', value: item.sanskrit });
      if (item.location)  items.push({ label: '📍 ตำแหน่ง', value: item.location });
      if (item.element)   items.push({ label: '🌿 ธาตุ', value: item.element });
      if (item.frequency) items.push({ label: '🎵 ความถี่', value: item.frequency });
    }
    if (type === 'planet') {
      if (item.rules) items.push({ label: '♈ ปกครอง', value: item.rules });
    }
    return items;
  }

  function buildStonesHTML(item) {
    if (!item.stones || !item.stones.length) return '';
    const stoneCards = item.stones.map((id, idx) => {
      const name = (item.stone_names && item.stone_names[idx]) || formatStoneName(id);
      const slug = `/stones/${id}.html`;
      return `<a href="${slug}" class="stone-card">
        <div class="stone-icon">${getStoneEmoji(id)}</div>
        <div>
          <div class="stone-name">${name}</div>
          <div class="stone-name-en">${formatStoneName(id)}</div>
        </div>
      </a>`;
    }).join('');
    return `
      <h2 class="section-title">💎 หินคริสตัลที่แนะนำ</h2>
      <div class="stones-grid">${stoneCards}</div>
    `;
  }

  function buildAffSection(item, allProducts) {
    const tags = item.stone_tags || [];
    const matched = allProducts.filter(p => {
      if (!p.tags || p.status === 'unavailable') return false;
      return tags.some(t => p.tags.includes(t));
    });

    if (!matched.length) {
      return `<div class="aff-section">
        <div class="aff-header">
          <h2 class="aff-title">🛒 สินค้าแนะนำ</h2>
          <span class="aff-badge">Shopee</span>
        </div>
        <div class="aff-empty">ยังไม่มีสินค้าในหมวดนี้ — กลับมาเร็วๆ นี้</div>
      </div>`;
    }

    const CHUNK = 4;
    let shown = 0;

    function productCard(p) {
      const img = p.image_url
        ? `<img class="aff-img" src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=aff-img-placeholder>🛒</div>'">`
        : `<div class="aff-img-placeholder">🛒</div>`;
      return `<div class="aff-card-wrap">
        <a href="${p.url}" target="_blank" rel="noopener noreferrer nofollow" class="aff-card">
          ${img}
          <div class="aff-info">
            <div class="aff-name">${p.name}</div>
            <div class="aff-price">฿${p.price.toLocaleString()}</div>
          </div>
          <div class="aff-btn">ดูบน Shopee →</div>
        </a>
      </div>`;
    }

    window._affProducts = matched;
    window._affShown = CHUNK;

    const initialCards = matched.slice(0, CHUNK).map(productCard).join('');
    const hasMore = matched.length > CHUNK;

    return `
      <div class="aff-section">
        <div class="aff-header">
          <h2 class="aff-title">🛒 สินค้าแนะนำ</h2>
          <span class="aff-badge">Shopee Affiliate</span>
        </div>
        <div class="aff-grid" id="aff-grid">${initialCards}</div>
        ${hasMore ? `<button class="load-more-btn" onclick="loadMoreAff(this)">
          ดูเพิ่มเติม (${matched.length - CHUNK} รายการ) ↓
        </button>` : ''}
      </div>
    `;
  }

  window.loadMoreAff = function(btn) {
    const grid = document.getElementById('aff-grid');
    const products = window._affProducts || [];
    const start = window._affShown;
    const CHUNK = 4;
    const next = products.slice(start, start + CHUNK);
    const STONE_EMJ = {};

    next.forEach(p => {
      const img = p.image_url
        ? `<img class="aff-img" src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=aff-img-placeholder>🛒</div>'">`
        : `<div class="aff-img-placeholder">🛒</div>`;
      const card = document.createElement('div');
      card.className = 'aff-card-wrap';
      card.innerHTML = `<a href="${p.url}" target="_blank" rel="noopener noreferrer nofollow" class="aff-card">
        ${img}
        <div class="aff-info">
          <div class="aff-name">${p.name}</div>
          <div class="aff-price">฿${p.price.toLocaleString()}</div>
        </div>
        <div class="aff-btn">ดูบน Shopee →</div>
      </a>`;
      grid.appendChild(card);
    });

    window._affShown += next.length;
    const remaining = products.length - window._affShown;
    if (remaining <= 0) {
      btn.remove();
    } else {
      btn.textContent = `ดูเพิ่มเติม (${remaining} รายการ) ↓`;
    }
  };

  // ── Main ──
  loadData().then(({ cats, products }) => {
    if (!catType || !itemId) {
      document.getElementById('main-content').innerHTML = `<p style="text-align:center;padding:3rem;color:#9ca3af">ไม่พบข้อมูล กรุณาระบุ type และ id ใน URL</p>`;
      return;
    }
    const list = cats[catType];
    if (!list) {
      document.getElementById('main-content').innerHTML = `<p style="text-align:center;padding:3rem;color:#9ca3af">ไม่พบหมวดหมู่ "${catType}"</p>`;
      return;
    }
    const item = list.find(i => i.id === itemId);
    if (!item) {
      document.getElementById('main-content').innerHTML = `<p style="text-align:center;padding:3rem;color:#9ca3af">ไม่พบข้อมูลสำหรับ "${itemId}"</p>`;
      return;
    }
    renderDetail(item, catType, products);
  }).catch(err => {
    document.getElementById('main-content').innerHTML = `<p style="text-align:center;padding:3rem;color:#ef4444">เกิดข้อผิดพลาด: ${err.message}</p>`;
  });
})();
</script>
</body>
</html>
