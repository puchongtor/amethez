<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หินตามจักระ 7 จักระ | สารานุกรมหิน Amethez</title>
  <meta name="description" content="ค้นหาหินคริสตัลที่เหมาะกับแต่ละจักระ ตั้งแต่จักระรากถึงจักระมงกุฎ พร้อมสินค้าแนะนำ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family:'Sarabun',sans-serif; background:#faf8f4; color:#1a1228; }
    .container { max-width:1080px; margin:0 auto; padding:0 1.25rem; }
    .cat-hero { background:linear-gradient(135deg,#1a1228 0%,#1e3a5f 50%,#4c1d95 100%); color:#fff; padding:3rem 0 2.5rem; text-align:center; position:relative; overflow:hidden; }
    .cat-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.3) 0%,transparent 70%); }
    .cat-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.75rem,4vw,2.5rem); margin:0 0 .5rem; position:relative; }
    .cat-hero p { opacity:.75; position:relative; }
    .breadcrumb { padding:.875rem 0; font-size:.85rem; color:#9ca3af; }
    .breadcrumb a { color:#7c3aed; text-decoration:none; }
    .section-wrap { padding:2.5rem 0; }
    .chakra-list { display:flex; flex-direction:column; gap:1rem; }
    .card { background:#fff; border:1.5px solid #ede9fe; border-radius:1.25rem; padding:1.5rem; text-decoration:none; color:#1a1228; transition:all .2s; display:flex; align-items:center; gap:1.25rem; position:relative; }
    .card::after { content:'→'; position:absolute; right:1.5rem; color:#c4b5fd; font-size:1.1rem; transition:transform .2s; }
    .card:hover { border-color:#7c3aed; transform:translateX(4px); box-shadow:0 4px 16px rgba(124,58,237,.12); }
    .card:hover::after { transform:translateX(4px); }
    .card-dot { width:3.5rem; height:3.5rem; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
    .card-name { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; }
    .card-sub { font-size:.85rem; color:#6b7280; margin:.2rem 0; }
    .card-traits { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.4rem; }
    .trait-chip { background:#ede9fe; color:#7c3aed; padding:.15rem .6rem; border-radius:2rem; font-size:.7rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body data-cms-page="chakra">
<header class="site-header"></header>
<main>
  <div class="cat-hero">
    <div class="container">
      <p style="font-size:2rem;margin-bottom:.5rem;position:relative">🔴🟠🟡💚🔵👁🟣</p>
      <h1 data-cms-text="title">หินคริสตัลตามจักระ</h1>
      <p data-cms-text="subtitle">เลือกหินให้ตรงกับจักระที่ต้องการปรับสมดุล ทั้ง 7 จักระหลัก</p>
    </div>
  </div>
  <div class="container">
    <nav class="breadcrumb"><a href="/stones/">📖 สารานุกรมหิน</a> › หินตามจักระ</nav>
    <div class="section-wrap">
      <div class="chakra-list" id="list">
        <div style="text-align:center;padding:3rem;color:#9ca3af">
          <div style="width:2rem;height:2rem;border:3px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem"></div>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="/js/cms.js"></script>
<script src="/js/components.js"></script>
<script>
fetch('/data/categories.json').then(r=>r.json()).then(data=>{
  document.getElementById('list').innerHTML=(data.chakra||[]).map(item=>`
    <a href="/categories/detail.html?type=chakra&id=${item.id}" class="card">
      <div class="card-dot" style="background:${item.color}22;border:2px solid ${item.color}">${item.emoji}</div>
      <div>
        <div class="card-name">${item.name}</div>
        <div class="card-sub">${item.sanskrit||''} · ${item.location||''} · ${item.frequency||''}</div>
        <div class="card-traits">${(item.traits||[]).slice(0,3).map(t=>`<span class="trait-chip">${t}</span>`).join('')}</div>
      </div>
    </a>`).join('');
});
</script>
<script src="/js/shila.js"></script>
</body>
</html>
