<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หินตามสี | สารานุกรมหิน Amethez</title>
  <meta name="description" content="ค้นหาหินคริสตัลตามสีที่ชอบ แต่ละสีมีความหมายและพลังงานที่แตกต่างกัน">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family:'Sarabun',sans-serif; background:#faf8f4; color:#1a1228; }
    .container { max-width:1080px; margin:0 auto; padding:0 1.25rem; }
    .cat-hero { background:linear-gradient(135deg,#1a1228 0%,#2d1b69 100%); color:#fff; padding:3rem 0 2.5rem; text-align:center; position:relative; overflow:hidden; }
    .cat-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.3) 0%,transparent 70%); }
    .cat-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.75rem,4vw,2.5rem); margin:0 0 .5rem; position:relative; }
    .cat-hero p { opacity:.75; position:relative; }
    .breadcrumb { padding:.875rem 0; font-size:.85rem; color:#9ca3af; }
    .breadcrumb a { color:#7c3aed; text-decoration:none; }
    .section-wrap { padding:2.5rem 0; }
    .color-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1.125rem; }
    .card { background:#fff; border:1.5px solid #ede9fe; border-radius:1.25rem; padding:1.75rem 1.25rem; text-decoration:none; color:#1a1228; transition:all .2s; text-align:center; display:flex; flex-direction:column; align-items:center; gap:.75rem; }
    .card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
    .color-swatch { width:4rem; height:4rem; border-radius:50%; margin:0 auto; box-shadow:0 4px 12px rgba(0,0,0,.15);
      position:relative; overflow:hidden; }
    .color-swatch::before { content:''; position:absolute; inset:0;
      background:linear-gradient(160deg,rgba(255,255,255,.45) 0%,transparent 50%),
                  radial-gradient(ellipse at 35% 25%,rgba(255,255,255,.35) 0%,transparent 55%); }
    .card-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; }
    .card-sub { font-size:.85rem; color:#6b7280; }
    .card-traits { display:flex; flex-wrap:wrap; gap:.3rem; justify-content:center; }
    .trait-chip { background:#ede9fe; color:#7c3aed; padding:.15rem .6rem; border-radius:2rem; font-size:.7rem; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Premium refresh ── */
    :root { --shadow-sm:0 1px 2px rgba(26,18,40,.05),0 2px 8px rgba(26,18,40,.04);
      --shadow-md:0 8px 24px rgba(26,18,40,.08),0 2px 6px rgba(124,58,237,.06);
      --shadow-lg:0 18px 44px rgba(26,18,40,.14),0 4px 14px rgba(124,58,237,.1); --gold-light:#e8cf85; }
    body { -webkit-font-smoothing:antialiased; }
    .kicker { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; font-size:.7rem;
      font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-light);
      margin-bottom:.5rem; position:relative; width:100%; }
    .kicker::before, .kicker::after { content:''; width:1.1rem; height:1px; background:currentColor; opacity:.55; }
    .cat-hero { background:radial-gradient(ellipse 120% 90% at 50% -10%,#3a2470 0%,#1a1228 55%,#0f0a1e 100%) !important; }
    .cat-hero::after { content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
      background:linear-gradient(90deg,transparent,#c9a84c 50%,transparent); }
    .cat-hero h1 { font-weight:800 !important; letter-spacing:-.01em; }
    .card, .num-card, .purpose-card, .grid > a { box-shadow:var(--shadow-sm); }
    .card:hover, .num-card:hover, .purpose-card:hover, .grid > a:hover { box-shadow:var(--shadow-lg) !important; transform:translateY(-4px) !important; }
    .calc-box, .birth-calc { box-shadow:var(--shadow-md) !important; }
    .calc-btn { box-shadow:0 4px 14px rgba(124,58,237,.3); transition:all .2s !important; }
    .calc-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(124,58,237,.4); }
  </style>
</head>
<body data-cms-page="color">
<header class="site-header"></header>
<main>
  <div class="cat-hero">
    <div class="container">
      <p style="font-size:2rem;margin-bottom:.5rem;position:relative">🔴🟠🟡🟢🔵🟣⚪⚫</p>
      <p class="kicker">By Color</p>
      <h1 data-cms-text="title">หินคริสตัลตามสี</h1>
      <p data-cms-text="subtitle">แต่ละสีมีความหมายและพลังงานเฉพาะ เลือกหินตามสีที่ดึงดูดคุณ</p>
    </div>
  </div>
  <div class="container">
    <nav class="breadcrumb"><a href="/stones/">📖 สารานุกรมหิน</a> › หินตามสี</nav>
    <div class="section-wrap">
      <div class="color-grid" id="grid">
        <div style="text-align:center;padding:3rem;color:#9ca3af;grid-column:1/-1">
          <div style="width:2rem;height:2rem;border:3px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem"></div>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="/js/cms.js"></script>
<script src="/js/components.js"></script>
<script>
// Color data inline (no category entry in JSON yet — uses static data)
const COLORS = [
  { id:'purple', name:'ม่วง', emoji:'💜', color:'#7c3aed', desc:'จิตวิญญาณ สมาธิ ปัญญา', traits:['สมาธิ','จิตวิญญาณ','ปัญญา'], examples:'อเมทิสต์, ลาพิสลาซูลี', tag:'ม่วง' },
  { id:'red', name:'แดง', emoji:'❤️', color:'#ef4444', desc:'พลังงาน ความกล้า ความรัก', traits:['พลังงาน','ความกล้า'], examples:'คาร์เนเลียน, การ์เนต', tag:'แดง' },
  { id:'orange', name:'ส้ม', emoji:'🧡', color:'#f97316', desc:'ความคิดสร้างสรรค์ ความสุข', traits:['สร้างสรรค์','มีชีวิตชีวา'], examples:'คาร์เนเลียน, ซันสโตน', tag:'ส้ม' },
  { id:'yellow', name:'เหลือง', emoji:'💛', color:'#eab308', desc:'การเงิน โชคลาภ ความสำเร็จ', traits:['การเงิน','โชคลาภ'], examples:'ซิทริน, ไพไรต์', tag:'เหลือง' },
  { id:'green', name:'เขียว', emoji:'💚', color:'#22c55e', desc:'ความรัก สุขภาพ ความอุดมสมบูรณ์', traits:['ความรัก','สุขภาพ'], examples:'มาลาไคต์, หยก', tag:'เขียว' },
  { id:'blue', name:'น้ำเงิน/ฟ้า', emoji:'💙', color:'#3b82f6', desc:'การสื่อสาร ความสงบ ปัญญา', traits:['การสื่อสาร','ความสงบ'], examples:'อะความารีน, ลาพิส', tag:'น้ำเงิน' },
  { id:'pink', name:'ชมพู', emoji:'🌸', color:'#ec4899', desc:'ความรัก ความอ่อนโยน การให้อภัย', traits:['ความรัก','ความอ่อนโยน'], examples:'โรสควอตซ์, มอร์แกไนต์', tag:'ชมพู' },
  { id:'black', name:'ดำ', emoji:'🖤', color:'#1e293b', desc:'ป้องกัน ดูดซับพลังลบ ความมั่นคง', traits:['ป้องกัน','ความมั่นคง'], examples:'ออบซิเดียน, แบล็กทัวร์มาลีน', tag:'ดำ' },
  { id:'white', name:'ขาว/ใส', emoji:'🤍', color:'#e2e8f0', desc:'บริสุทธิ์ ชำระล้าง พลังงานสูง', traits:['บริสุทธิ์','ชำระล้าง'], examples:'ควอตซ์ใส, เซเลไนต์', tag:'ขาว' },
  { id:'brown', name:'น้ำตาล', emoji:'🤎', color:'#92400e', desc:'ความมั่นคง กราวด์ดิ้ง เชื่อมโยงพื้นดิน', traits:['ความมั่นคง','Grounding'], examples:'สโมกกี้ควอตซ์, ไทเกอร์อาย', tag:'น้ำตาล' },
  { id:'multi', name:'หลากสี', emoji:'🌈', color:'#a78bfa', desc:'มุมมองหลากหลาย ความคิดสร้างสรรค์ การเปลี่ยนแปลง', traits:['มุมมองกว้าง','สร้างสรรค์'], examples:'ลาบราดอไรต์, โอปอล', tag:'หลากสี' },
  { id:'clear', name:'ใส', emoji:'💎', color:'#dbeafe', desc:'ความชัดเจน การขยายพลังงาน จิตวิญญาณ', traits:['ความชัดเจน','ขยายพลังงาน'], examples:'เคลียร์ควอตซ์, เพชร', tag:'ใส' },
];
document.getElementById('grid').innerHTML=COLORS.map(c=>`
  <a href="/stones/a-z.html?color=${c.id}" class="card" style="border-color:${c.color}33">
    <div class="color-swatch" style="background:${c.color}"></div>
    <div class="card-name">${c.name}</div>
    <div class="card-sub">${c.examples}</div>
    <div class="card-traits">${c.traits.map(t=>`<span class="trait-chip">${t}</span>`).join('')}</div>
  </a>`).join('');
</script>
<script src="/js/shila.js"></script>
</body>
</html>
