<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หินตามวัตถุประสงค์ | สารานุกรมหิน Amethez</title>
  <meta name="description" content="ค้นหาหินคริสตัลตามวัตถุประสงค์ที่ต้องการ ความรัก การเงิน สุขภาพ ป้องกัน สมาธิ และอื่นๆ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family:'Sarabun',sans-serif; background:#faf8f4; color:#1a1228; }
    .container { max-width:1080px; margin:0 auto; padding:0 1.25rem; }
    .cat-hero { background:linear-gradient(135deg,#1a1228 0%,#2d1b69 100%); color:#fff; padding:3rem 0 2.5rem; text-align:center; position:relative; overflow:hidden; }
    .cat-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.3) 0%,transparent 70%); }
    .cat-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.75rem,4vw,2.5rem); margin:0 0 .5rem; position:relative; }
    .cat-hero p { opacity:.75; position:relative; }
    .breadcrumb { padding:.875rem 0; font-size:.85rem; color:#9ca3af; }
    .breadcrumb a { color:#7c3aed; text-decoration:none; }
    .section-wrap { padding:2.5rem 0; }
    .purpose-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1.25rem; }
    .card { background:#fff; border:1.5px solid #ede9fe; border-radius:1.25rem; padding:1.75rem 1.5rem; text-decoration:none; color:#1a1228; transition:all .2s; position:relative; overflow:hidden; }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; border-radius:1.25rem 1.25rem 0 0; }
    .card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.1); border-color:var(--c); }
    .card-emoji { font-size:2.5rem; margin-bottom:.75rem; display:block; }
    .card-name { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; margin-bottom:.4rem; }
    .card-desc { font-size:.875rem; color:#6b7280; line-height:1.6; }
    .card-arrow { position:absolute; bottom:1.25rem; right:1.25rem; color:#c4b5fd; font-size:1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body data-cms-page="purpose">
<header class="site-header"></header>
<main>
  <div class="cat-hero">
    <div class="container">
      <p style="font-size:2rem;margin-bottom:.5rem;position:relative">💕💰🏆🛡💚🧘😴🔮</p>
      <h1 data-cms-text="title">หินคริสตัลตามวัตถุประสงค์</h1>
      <p data-cms-text="subtitle">เลือกหินตามสิ่งที่ต้องการในชีวิต ตั้งแต่ความรัก การเงิน ไปจนถึงจิตวิญญาณ</p>
    </div>
  </div>
  <div class="container">
    <nav class="breadcrumb"><a href="/stones/">📖 สารานุกรมหิน</a> › หินตามวัตถุประสงค์</nav>
    <div class="section-wrap">
      <div class="purpose-grid" id="grid">
        <div style="text-align:center;padding:3rem;color:#9ca3af;grid-column:1/-1">
          <div style="width:2rem;height:2rem;border:3px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem"></div>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="/js/cms.js"></script>
<script src="/js/components.js"></script>
<script>
fetch('/data/categories.json').then(r=>r.json()).then(data=>{
  document.getElementById('grid').innerHTML=(data.purpose||[]).map(item=>`
    <a href="/categories/detail.html?type=purpose&id=${item.id}" class="card" style="--c:${item.color}">
      <style>.card[style*="${item.color}"]::before{background:${item.color}}</style>
      <span class="card-emoji">${item.emoji}</span>
      <div class="card-name">${item.name}</div>
      <div class="card-desc">${item.description||''}</div>
      <span class="card-arrow">→</span>
    </a>`).join('');
});
</script>
<script src="/js/shila.js"></script>
</body>
</html>
