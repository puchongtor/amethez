<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หินตามธาตุทั้ง 5 | สารานุกรมหิน Amethez</title>
  <meta name="description" content="ค้นหาหินคริสตัลตามธาตุทั้ง 5 ไฟ น้ำ ดิน ลม และอีเธอร์ แต่ละธาตุมีพลังงานเฉพาะตัว">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family:'Sarabun',sans-serif; background:#faf8f4; color:#1a1228; }
    .container { max-width:1080px; margin:0 auto; padding:0 1.25rem; }
    .cat-hero { background:linear-gradient(135deg,#1a1228 0%,#2d1b69 100%); color:#fff; padding:3rem 0 2.5rem; text-align:center; position:relative; overflow:hidden; }
    .cat-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.3) 0%,transparent 70%); }
    .cat-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.75rem,4vw,2.5rem); margin:0 0 .5rem; position:relative; }
    .cat-hero p { opacity:.75; position:relative; }
    .breadcrumb { padding:.875rem 0; font-size:.85rem; color:#9ca3af; }
    .breadcrumb a { color:#7c3aed; text-decoration:none; }
    .section-wrap { padding:2.5rem 0; }
    .element-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.25rem; }
    .card { background:#fff; border:1.5px solid #ede9fe; border-radius:1.5rem; padding:2rem 1.5rem; text-decoration:none; color:#1a1228; transition:all .25s; position:relative; overflow:hidden; }
    .card-bg { position:absolute; top:-1rem; right:-1rem; font-size:6rem; opacity:.06; pointer-events:none; }
    .card:hover { transform:translateY(-5px); box-shadow:0 10px 30px rgba(0,0,0,.1); }
    .card-emoji { font-size:3rem; margin-bottom:.875rem; display:block; }
    .card-name { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; margin-bottom:.375rem; }
    .card-name-en { font-size:.85rem; color:#9ca3af; margin-bottom:.875rem; }
    .card-desc { font-size:.875rem; color:#6b7280; line-height:1.65; margin-bottom:1rem; }
    .card-traits { display:flex; flex-wrap:wrap; gap:.35rem; }
    .trait-chip { padding:.2rem .7rem; border-radius:2rem; font-size:.75rem; font-weight:600; }
    .card-arrow { position:absolute; bottom:1.25rem; right:1.25rem; color:#c4b5fd; font-size:1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:640px) { .element-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header class="site-header"></header>
<main>
  <div class="cat-hero">
    <div class="container">
      <p style="font-size:2.5rem;margin-bottom:.5rem;position:relative">🔥💧🌍💨✨</p>
      <h1>หินคริสตัลตามธาตุ</h1>
      <p>ธาตุทั้ง 5 มีพลังงานที่แตกต่างกัน เลือกหินให้สอดคล้องกับธาตุของคุณ</p>
    </div>
  </div>
  <div class="container">
    <nav class="breadcrumb"><a href="/stones/">📖 สารานุกรมหิน</a> › หินตามธาตุ</nav>
    <div class="section-wrap">
      <div class="element-grid" id="grid">
        <div style="text-align:center;padding:3rem;color:#9ca3af;grid-column:1/-1">
          <div style="width:2rem;height:2rem;border:3px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem"></div>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="/js/cms.js"></script>
<script src="/js/components.js"></script>
<script>
fetch('/data/categories.json').then(r=>r.json()).then(data=>{
  document.getElementById('grid').innerHTML=(data.element||[]).map(item=>`
    <a href="/categories/detail.html?type=element&id=${item.id}" class="card" style="border-color:${item.color}44">
      <div class="card-bg">${item.emoji}</div>
      <span class="card-emoji">${item.emoji}</span>
      <div class="card-name">${item.name}</div>
      <div class="card-name-en">${item.name_en}</div>
      <div class="card-desc">${item.description||''}</div>
      <div class="card-traits">${(item.traits||[]).map(t=>`<span class="trait-chip" style="background:${item.color}18;color:${item.color}">${t}</span>`).join('')}</div>
      <span class="card-arrow">→</span>
    </a>`).join('');
});
</script>
<script src="/js/shila.js"></script>
</body>
</html>
