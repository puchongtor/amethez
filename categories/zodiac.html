<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หินตามราศี 12 ราศี | สารานุกรมหิน Amethez</title>
  <meta name="description" content="ค้นหาหินคริสตัลที่เหมาะกับราศีของคุณ ครบทั้ง 12 ราศี พร้อมคำอธิบายและสินค้าแนะนำ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&family=Kanit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #faf8f4; color: #1a1228; }
    .container { max-width: 1080px; margin: 0 auto; padding: 0 1.25rem; }
    .cat-hero {
      background: linear-gradient(135deg, #1a1228 0%, #2d1b69 60%, #4c1d95 100%);
      color: #fff; padding: 3rem 0 2.5rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .cat-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.3) 0%, transparent 70%);
    }
    .cat-hero h1 { font-family:'Kanit',sans-serif; font-size: clamp(1.75rem, 4vw, 2.5rem); margin: 0 0 .5rem; position: relative; }
    .cat-hero p { opacity: .75; position: relative; font-size: 1rem; }
    .breadcrumb { padding: .875rem 0; font-size: .85rem; color: #9ca3af; }
    .breadcrumb a { color: #7c3aed; text-decoration: none; }
    .section-wrap { padding: 2.5rem 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.125rem; }
    .card {
      background: #fff; border: 1.5px solid #ede9fe; border-radius: 1.25rem;
      padding: 1.5rem 1.25rem; text-decoration: none; color: #1a1228;
      transition: all .2s; display: flex; align-items: center; gap: 1rem;
      position: relative; overflow: hidden;
    }
    .card::after { content: '→'; position: absolute; right: 1.25rem; color: #c4b5fd; font-size: 1.1rem; transition: transform .2s; }
    .card:hover { border-color: #7c3aed; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(124,58,237,.15); }
    .card:hover::after { transform: translateX(4px); }
    .card-emoji { font-size: 2.25rem; width: 3rem; height: 3rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
    .card-name-en { font-size: .8rem; color: #9ca3af; }
    .card-meta { font-size: .8rem; color: #6b7280; margin-top: .25rem; }
    .card-traits { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .5rem; }
    .trait-chip { background: #ede9fe; color: #7c3aed; padding: .15rem .6rem; border-radius: 2rem; font-size: .7rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .card { flex-direction: column; text-align: center; gap: .5rem; padding: 1.25rem .875rem; }
      .card::after { display: none; }
      .card-traits { justify-content: center; }
    }

    /* ── Premium refresh ── */
    :root { --shadow-sm:0 1px 2px rgba(26,18,40,.05),0 2px 8px rgba(26,18,40,.04);
      --shadow-md:0 8px 24px rgba(26,18,40,.08),0 2px 6px rgba(124,58,237,.06);
      --shadow-lg:0 18px 44px rgba(26,18,40,.14),0 4px 14px rgba(124,58,237,.1); --gold-light:#e8cf85; }
    body { -webkit-font-smoothing:antialiased; }
    .kicker { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; font-size:.7rem;
      font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-light);
      margin-bottom:.5rem; position:relative; width:100%; }
    .kicker::before, .kicker::after { content:''; width:1.1rem; height:1px; background:currentColor; opacity:.55; }
    .cat-hero { background:radial-gradient(ellipse 120% 90% at 50% -10%,#3a2470 0%,#1a1228 55%,#0f0a1e 100%) !important; }
    .cat-hero::after { content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
      background:linear-gradient(90deg,transparent,#c9a84c 50%,transparent); }
    .cat-hero h1 { font-weight:800 !important; letter-spacing:-.01em; }
    .card, .num-card, .purpose-card, .grid > a { box-shadow:var(--shadow-sm); }
    .card:hover, .num-card:hover, .purpose-card:hover, .grid > a:hover { box-shadow:var(--shadow-lg) !important; transform:translateY(-4px) !important; }
    .calc-box, .birth-calc { box-shadow:var(--shadow-md) !important; }
    .calc-btn { box-shadow:0 4px 14px rgba(124,58,237,.3); transition:all .2s !important; }
    .calc-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(124,58,237,.4); }
  </style>
</head>
<body data-cms-page="zodiac">
<header class="site-header"></header>
<main>
  <div class="cat-hero">
    <div class="container">
      <p style="font-size:2rem;margin-bottom:.5rem;position:relative;letter-spacing:.2rem">♈♉♊♋♌♍♎♏♐♑♒♓</p>
      <p class="kicker">By Zodiac</p>
      <h1 data-cms-text="title">หินคริสตัลตามราศี</h1>
      <p data-cms-text="subtitle">ค้นหาหินที่สอดคล้องกับพลังงานราศีของคุณ ครบทั้ง 12 ราศี</p>
    </div>
  </div>
  <div class="container">
    <nav class="breadcrumb"><a href="/stones/">📖 สารานุกรมหิน</a> › หินตามราศี</nav>
    <div class="section-wrap">
      <div class="grid" id="grid">
        <div style="text-align:center;padding:3rem;color:#9ca3af;grid-column:1/-1">
          <div style="width:2rem;height:2rem;border:3px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem"></div>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="/js/cms.js"></script>
<script src="/js/components.js"></script>
<script>
fetch('/data/categories.json').then(r=>r.json()).then(data=>{
  document.getElementById('grid').innerHTML=(data.zodiac||[]).map(item=>`
    <a href="/categories/detail.html?type=zodiac&id=${item.id}" class="card">
      <div class="card-emoji">${item.emoji}</div>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-name-en">${item.name_en}</div>
        <div class="card-meta">${item.dates||''}</div>
        <div class="card-traits">${(item.traits||[]).slice(0,2).map(t=>`<span class="trait-chip">${t}</span>`).join('')}</div>
      </div>
    </a>`).join('');
});
</script>
<script src="/js/shila.js"></script>
</body>
</html>
