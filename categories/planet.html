<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หินตามดาวเคราะห์ | สารานุกรมหิน Amethez</title>
  <meta name="description" content="ค้นหาหินคริสตัลที่สอดคล้องกับดาวเคราะห์ในโหราศาสตร์ ดวงอาทิตย์ ดวงจันทร์ ดาวพุธ ศุกร์ อังคาร พฤหัส เสาร์ ราหู เกตุ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { font-family:'Sarabun',sans-serif; background:#faf8f4; color:#1a1228; }
    .container { max-width:1080px; margin:0 auto; padding:0 1.25rem; }
    .cat-hero { background:linear-gradient(135deg,#0f0a1e 0%,#1a1228 50%,#2d1b69 100%); color:#fff; padding:3rem 0 2.5rem; text-align:center; position:relative; overflow:hidden; }
    .cat-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.25) 0%,transparent 65%); }
    .cat-hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.75rem,4vw,2.5rem); margin:0 0 .5rem; position:relative; }
    .cat-hero p { opacity:.75; position:relative; }
    .breadcrumb { padding:.875rem 0; font-size:.85rem; color:#9ca3af; }
    .breadcrumb a { color:#7c3aed; text-decoration:none; }
    .section-wrap { padding:2.5rem 0; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1.125rem; }
    .card { background:#fff; border:1.5px solid #ede9fe; border-radius:1.25rem; padding:1.5rem 1.25rem; text-decoration:none; color:#1a1228; transition:all .2s; display:flex; align-items:center; gap:1rem; position:relative; }
    .card::after { content:'→'; position:absolute; right:1.25rem; color:#c4b5fd; font-size:1.1rem; transition:transform .2s; }
    .card:hover { border-color:#7c3aed; transform:translateY(-3px); box-shadow:0 6px 20px rgba(124,58,237,.15); }
    .card:hover::after { transform:translateX(4px); }
    .card-emoji { font-size:2.25rem; width:3.25rem; height:3.25rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; border-radius:.75rem; background:#faf8f4; }
    .card-name { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; }
    .card-sub { font-size:.8rem; color:#6b7280; margin:.2rem 0; }
    .card-traits { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.4rem; }
    .trait-chip { background:#ede9fe; color:#7c3aed; padding:.15rem .6rem; border-radius:2rem; font-size:.7rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:640px) { .grid { grid-template-columns:1fr 1fr; } .card::after { display:none; } }
  </style>
</head>
<body>
<header class="site-header"></header>
<main>
  <div class="cat-hero">
    <div class="container">
      <p style="font-size:2rem;margin-bottom:.5rem;position:relative">☀️🌙☿♀️♂️♃♄🌑☄️</p>
      <h1>หินคริสตัลตามดาวเคราะห์</h1>
      <p>หินที่สอดคล้องกับพลังงานดาวเคราะห์แต่ละดวง ตามโหราศาสตร์สากลและไทย</p>
    </div>
  </div>
  <div class="container">
    <nav class="breadcrumb"><a href="/stones/">📖 สารานุกรมหิน</a> › หินตามดาวเคราะห์</nav>
    <div class="section-wrap">
      <div class="grid" id="grid">
        <div style="text-align:center;padding:3rem;color:#9ca3af;grid-column:1/-1">
          <div style="width:2rem;height:2rem;border:3px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem"></div>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="/js/components.js"></script>
<script>
fetch('/data/categories.json').then(r=>r.json()).then(data=>{
  document.getElementById('grid').innerHTML=(data.planet||[]).map(item=>`
    <a href="/categories/detail.html?type=planet&id=${item.id}" class="card">
      <div class="card-emoji">${item.emoji}</div>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-sub">ปกครอง ${item.rules||''}</div>
        <div class="card-traits">${(item.traits||[]).slice(0,2).map(t=>`<span class="trait-chip">${t}</span>`).join('')}</div>
      </div>
    </a>`).join('');
});
</script>
</body>
</html>
