name: Deploy Amethez

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 TH (UTC+7)
    - cron: '0 6 * * *'   # 13:00 TH
    - cron: '0 13 * * *'  # 20:00 TH
  push:
    branches: [main]
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check scheduled posts
        run: node scripts/check-schedule.js

      - name: Generate sitemap
        run: node scripts/sitemap.js || true

      - name: Generate API config (Shila chat proxy key)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/gen-api-config.js

      - name: Commit schedule/sitemap state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json sitemap.xml 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync published schedule + sitemap [skip ci]"
            git push
          else
            echo "No schedule/sitemap changes to commit"
          fi

      - name: Deploy to HostNeverDie via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 2121
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/scripts/**
            **/CLAUDE.md
            **/Amethez.md

      - name: Notify Line OA (new content)
        if: success()
        run: |
          echo "Deploy successful at $(date '+%Y-%m-%d %H:%M:%S TH')"
